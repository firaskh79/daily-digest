name: Daily Cultural Digest

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC every day (laptop state irrelevant)
  workflow_dispatch:        # Manual trigger from GitHub UI anytime

permissions:
  contents: write           # Needed to commit and push back to repo

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests beautifulsoup4 lxml

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_digest.py

      - name: Commit and push
        run: |
          git config user.name "Daily Digest Bot"
          git config user.email "digest-bot@github-actions"
          git add .
          git diff --staged --quiet || git commit -m "Digest $(date -u +%Y-%m-%d)"
          git push
