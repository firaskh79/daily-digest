<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digest Collage · 25 May 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a18;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 1rem;
  }
  h1 { font-size: 0.75rem; color: #9a9894; letter-spacing: 0.1em; text-transform: uppercase; }

  /* Collage grid — one hero left, 2×2 right */
  .collage {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 200px 200px;
    gap: 2px;
    width: min(780px, 100vw);
    background: #0e0e0d;
  }
  .tile {
    position: relative;
    overflow: hidden;
    background: #222;
  }
  .tile.hero {
    grid-column: 1;
    grid-row: 1 / 3;
  }
  .tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }
  .tile .lbl {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.58);
    color: rgba(255,255,255,0.9);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.07em;
    padding: 3px 7px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  /* Debug: show which images loaded */
  #log {
    font-size: 0.7rem;
    color: #6a6760;
    width: min(780px, 100vw);
    line-height: 1.6;
  }
</style>
</head>
<body>

<h1>Firas's Digest · 25 May 2026</h1>

<div class="collage">
  <div class="tile hero">
    <img id="img0"
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/39/USCGC_Aquidneck_in_Strait_of_Hormuz_201202-N-IE405-2219.JPG/640px-USCGC_Aquidneck_in_Strait_of_Hormuz_201202-N-IE405-2219.JPG"
      alt="Iran · Hormuz"
      onload="log(0,'✓')" onerror="log(0,'✗ failed')">
    <span class="lbl">Iran · Hormuz</span>
  </div>
  <div class="tile">
    <img id="img1"
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/ff/Ebola_virus_em.jpg/640px-Ebola_virus_em.jpg"
      alt="Ebola · DRC"
      onload="log(1,'✓')" onerror="log(1,'✗ failed')">
    <span class="lbl">Ebola · DRC</span>
  </div>
  <div class="tile">
    <img id="img2"
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e5/Ekrem_Imamoglu_campaigning_on_May_23%2C_2019.jpg/640px-Ekrem_Imamoglu_campaigning_on_May_23%2C_2019.jpg"
      alt="Turkey · CHP"
      onload="log(2,'✓')" onerror="log(2,'✗ failed')">
    <span class="lbl">Turkey · CHP</span>
  </div>
  <div class="tile">
    <img id="img3"
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Players%27_tunnel_at_Tottenham_Hotspur_Stadium%2C_view_towards_pitch.jpg/640px-Players%27_tunnel_at_Tottenham_Hotspur_Stadium%2C_view_towards_pitch.jpg"
      alt="Final Day · PL"
      onload="log(3,'✓')" onerror="log(3,'✗ failed')">
    <span class="lbl">Final Day · PL</span>
  </div>
  <div class="tile">
    <img id="img4"
      src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5a/Hormuz_map.png/640px-Hormuz_map.png"
      alt="Strait · Map"
      onload="log(4,'✓')" onerror="log(4,'✗ failed')">
    <span class="lbl">Strait · Map</span>
  </div>
</div>

<div id="log">Waiting…</div>

<script>
const labels = ['Iran·Hormuz','Ebola·DRC','Turkey·CHP','FinalDay·PL','Strait·Map'];
const results = new Array(5).fill('…');
function log(i, status) {
  results[i] = labels[i] + ' ' + status;
  document.getElementById('log').textContent = results.join('  |  ');
}
</script>
</body>
</html>
