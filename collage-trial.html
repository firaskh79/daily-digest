<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digest Collage · 25 May 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a18;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 1rem;
  }
  h1 { font-size: 0.75rem; color: #9a9894; letter-spacing: 0.1em; text-transform: uppercase; }

  .collage {
    display: grid;
    width: min(780px, 100vw);
    height: 400px;
    gap: 2px;
    background: #0e0e0d;
    border-radius: 2px;
    overflow: hidden;
    /* columns set dynamically by JS */
    grid-template-columns: var(--hero-w, 42%) 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }

  .tile {
    position: relative;
    overflow: hidden;
    background: #222;
    transition: opacity 0.3s;
  }
  .tile.hero {
    grid-column: 1;
    grid-row: 1 / 3;
  }
  .tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transition: opacity 0.4s;
  }
  .tile .lbl {
    position: absolute;
    bottom: 8px;
    left: 8px;
    background: rgba(0,0,0,0.58);
    color: rgba(255,255,255,0.9);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.07em;
    padding: 3px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    pointer-events: none;
  }

  .controls { display: flex; gap: 0.6rem; }
  button {
    padding: 0.45rem 1.2rem;
    border: 1px solid #3a3a38;
    border-radius: 5px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    background: #2a2a28;
    color: #e8e6e1;
  }
  button:hover { background: #3a3a38; }
  #status { font-size: 0.7rem; color: #6a6760; min-height: 1em; text-align: center; max-width: 600px; }
</style>
</head>
<body>

<h1>Firas's Digest · 25 May 2026</h1>

<div class="collage" id="collage">
  <div class="tile hero"><img id="t0" src="" alt=""><span class="lbl" id="l0"></span></div>
  <div class="tile"><img id="t1" src="" alt=""><span class="lbl" id="l1"></span></div>
  <div class="tile"><img id="t2" src="" alt=""><span class="lbl" id="l2"></span></div>
  <div class="tile"><img id="t3" src="" alt=""><span class="lbl" id="l3"></span></div>
  <div class="tile"><img id="t4" src="" alt=""><span class="lbl" id="l4"></span></div>
</div>

<div class="controls">
  <button id="btn-reshuffle">↺ Reshuffle layout</button>
  <button id="btn-refresh">⟳ Different images</button>
</div>
<div id="status"></div>

<script>
// Pool of Wikimedia Commons images — more than 5 so Refresh can pick different sets
// All filenames verified from Commons search results
const POOL = [
  { file: "USCGC_Aquidneck_in_Strait_of_Hormuz_201202-N-IE405-2219.JPG", label: "Iran · Hormuz" },
  { file: "Hormuz_map.png",                                                label: "Strait · Map" },
  { file: "Oil_tanker_MV_Houston.JPG",                                     label: "Brent · $105" },
  { file: "Ebola_virus_em.jpg",                                            label: "Ebola · DRC" },
  { file: "View_of_the_City_of_Kinshasa,_DRC.jpg",                        label: "Kinshasa · DRC" },
  { file: "Ekrem_Imamoglu_campaigning_on_May_23,_2019.jpg",               label: "Turkey · CHP" },
  { file: "Players'_tunnel_at_Tottenham_Hotspur_Stadium,_view_towards_pitch.jpg", label: "Final Day · PL" },
  { file: "Etihad_Stadium,_Manchester_City_Football_Club_(Ank_Kumar,_Infosys)_04.jpg", label: "Premier League" },
  { file: "Lebanese_Armed_Forces.jpg",                                     label: "Lebanon · South" },
  { file: "2006_Lebanon-Israel_War_Memorial.JPG",                          label: "Lebanon · War" },
  { file: "Crude_Oil_Tanker_Pericles_at_BP_Oil_Refinery_Jetty_and_General_Cargo_Ship_Jannes_at_Kwinana_Bulk_Jetty,_December_2020_01.jpg", label: "Oil · Market" },
];

function redirect(filename) {
  return "https://commons.wikimedia.org/w/index.php?title=Special:Redirect/file/"
    + encodeURIComponent(filename) + "&width=640";
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Pick 5 random items from pool, avoiding same set as current
let current = [];

function pickFive() {
  const shuffled = shuffle(POOL);
  // Try not to repeat the same 5
  const candidates = shuffled.filter(p => !current.find(c => c.file === p.file));
  const pick = candidates.length >= 5 ? candidates.slice(0, 5) : shuffled.slice(0, 5);
  current = pick;
  return pick;
}

// Apply images to tiles
function setImages(items) {
  items.forEach((item, i) => {
    const img = document.getElementById('t' + i);
    const lbl = document.getElementById('l' + i);
    img.style.opacity = 0;
    img.onload = () => { img.style.opacity = 1; updateStatus(); };
    img.onerror = () => { img.style.opacity = 0.3; updateStatus(); };
    img.src = redirect(item.file);
    img.alt = item.label;
    lbl.textContent = item.label;
  });
  updateStatus();
}

// Vary hero column width for layout variation
const heroWidths = ['36%', '40%', '44%', '48%', '52%'];
let heroIdx = 2;

function reshuffle() {
  heroIdx = (heroIdx + 1 + Math.floor(Math.random() * (heroWidths.length - 1))) % heroWidths.length;
  document.getElementById('collage').style.setProperty('--hero-w', heroWidths[heroIdx]);
  // Also rotate which image is in the hero slot
  current = shuffle(current);
  setImages(current);
}

function refresh() {
  const items = pickFive();
  heroIdx = Math.floor(Math.random() * heroWidths.length);
  document.getElementById('collage').style.setProperty('--hero-w', heroWidths[heroIdx]);
  setImages(items);
}

function updateStatus() {
  // just clear status once images are assigned
  document.getElementById('status').textContent = '';
}

document.getElementById('btn-reshuffle').onclick = reshuffle;
document.getElementById('btn-refresh').onclick = refresh;

// Initial load
refresh();
</script>
</body>
</html>
