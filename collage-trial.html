<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digest Collage · 25 May 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a18;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 1rem;
  }
  h1 { font-size: 0.75rem; color: #9a9894; letter-spacing: 0.1em; text-transform: uppercase; }
  .collage {
    display: grid;
    width: min(820px, 100vw);
    height: var(--h, 460px);
    gap: 2px;
    background: #0e0e0d;
    border-radius: 2px;
    overflow: hidden;
    grid-template-columns: var(--cols, repeat(6, 1fr));
    grid-template-rows: 1fr;
  }
  .tile {
    position: relative;
    overflow: hidden;
    background: #1e1e1c;
    cursor: zoom-in;
  }
  .tile img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block;
    opacity: 0;
    transition: opacity 0.4s, transform 0.3s ease;
  }
  .tile img.loaded { opacity: 1; }
  .tile:hover img.loaded {
    transform: scale(1.07);
  }
  .tile .lbl {
    position: absolute;
    bottom: 8px; left: 8px;
    background: rgba(0,0,0,0.6);
    color: rgba(255,255,255,0.88);
    font-size: 8.5px; font-weight: 700;
    letter-spacing: 0.07em;
    padding: 3px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .tile:hover .lbl { opacity: 0; }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.7);
    animation: lb-in 0.2s ease;
  }
  #lightbox .lb-lbl {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: rgba(255,255,255,0.85);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 4px;
    pointer-events: none;
  }
  #lightbox .lb-close {
    position: fixed;
    top: 1rem; right: 1.25rem;
    color: rgba(255,255,255,0.5);
    font-size: 1.5rem;
    line-height: 1;
    cursor: pointer;
    pointer-events: all;
  }
  @keyframes lb-in {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  .controls { display: flex; gap: 0.6rem; }
  button {
    padding: 0.45rem 1.2rem;
    border: 1px solid #3a3a38; border-radius: 5px;
    font-size: 0.78rem; cursor: pointer;
    font-family: inherit;
    background: #2a2a28; color: #e8e6e1;
    transition: background 0.15s;
  }
  button:hover { background: #3a3a38; }
</style>
</head>
<body>
<h1>Firas's Digest · 25 May 2026</h1>
<div class="collage" id="collage"></div>
<div class="controls">
  <button id="btn-shuffle">↺ Shuffle</button>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span class="lb-close" id="lb-close">✕</span>
  <img id="lb-img" src="" alt="">
  <div class="lb-lbl" id="lb-lbl"></div>
</div>

<script>
// ── 50-image pool ─────────────────────────────────────────────────────────────
const POOL = [
  // Geopolitics — Iran/Hormuz
  { f: "USCGC_Aquidneck_in_Strait_of_Hormuz_201202-N-IE405-2219.JPG",   l: "Iran · Hormuz" },
  { f: "Hormuz_map.png",                                                  l: "Strait · Map" },
  { f: "Aerial_View_of_Tehran_and_Tochal.JPG",                           l: "Tehran" },
  { f: "Aerial_View_of_Tehran_26.11.2008_04-35-03.JPG",                  l: "Tehran · Aerial" },
  { f: "Azadi_Tower_-_Tehran-_Iran_(1).jpg",                             l: "Tehran · Azadi" },

  // Geopolitics — Lebanon/Israel
  { f: "Lebanese_Armed_Forces.jpg",                                       l: "Lebanon · South" },
  { f: "2006_Lebanon-Israel_War_Memorial.JPG",                            l: "Lebanon · War" },
  { f: "Downtown_Beirut_Lebanon.JPG",                                     l: "Beirut" },

  // Turkey
  { f: "Ekrem_Imamoglu_campaigning_on_May_23,_2019.jpg",                 l: "İmamoğlu · CHP" },
  { f: "Recep_Tayyip_Erdogan_portrait.PNG",                              l: "Erdogan" },

  // UK politics / trending
  { f: "Nigel_Farage_(cropped).jpg",                                      l: "Farage" },
  { f: "Nigel_Farage_MEP_1,_Strasbourg_-_Diliff.jpg",                    l: "Farage · MEP" },
  { f: "Houses_of_Parliament_-_Palace_of_Westminster.JPG",                l: "Westminster" },
  { f: "Parliament_at_Sunset.JPG",                                        l: "Parliament" },

  // Markets / UK economy
  { f: "Bank_of_England_Building,_London,_UK_-_Diliff.jpg",              l: "Bank of England" },
  { f: "Bank_of_England,_London.JPG",                                     l: "Gilt · 5.53%" },
  { f: "Oil_tanker_MV_Houston.JPG",                                       l: "Brent · $105" },
  { f: "Crude_Oil_Tanker_Pericles_at_BP_Oil_Refinery_Jetty_and_General_Cargo_Ship_Jannes_at_Kwinana_Bulk_Jetty,_December_2020_01.jpg", l: "Oil · Market" },

  // Health — Ebola
  { f: "Ebola_virus_em.jpg",                                              l: "Ebola · DRC" },
  { f: "View_of_the_City_of_Kinshasa,_DRC.jpg",                          l: "Kinshasa · DRC" },

  // Music — Apple Music UK top 5
  { f: "Olivia_Dean_-_4323.jpg",                                          l: "Olivia Dean · #1" },
  { f: "Sam_Fender_(2021)_(cropped).jpg",                                 l: "Sam Fender · #2" },
  { f: "Santan_Dave.jpg",                                                  l: "Dave & Tems · #3" },
  { f: "2019_Tems_on_NdaniTV_Sssions.jpg",                               l: "Tems · #3" },

  // TikTok sounds
  { f: "Aya_Nakamura_2023.jpg",                                           l: "Aya Nakamura · TT" },

  { f: "Players'_tunnel_at_Tottenham_Hotspur_Stadium,_view_towards_pitch.jpg", l: "Spurs · Final Day" },

  { f: "Goodisonview1.JPG",                                               l: "Goodison Park" },
  { f: "Liverpool_fc_everton_stadium.jpg",                                l: "Merseyside" },
  { f: "Etihad_Stadium,_Manchester_City_Football_Club_(Ank_Kumar,_Infosys)_04.jpg", l: "Etihad · PL" },
  { f: "Etihad_Stadium,_Manchester_City_Football_Club_(Ank_Kumar,_Infosys)_02.jpg", l: "Man City" },
  { f: "Etihad_Stadium,_Manchester_City_Football_Club_(Ank_Kumar,_Infosys)_16.jpg", l: "Premier League" },
  { f: "London_stanford_bridge.JPG",                                      l: "Stamford Bridge" },
  { f: "Stoke.JPG",                                                       l: "PL Promotion" },
  { f: "2023_London_Marathon_-_Frank_Lara_(2).jpg",                       l: "London Marathon" },
  { f: "2023_London_Marathon_-_Sean_Frame_(3).jpg",                       l: "Marathon · Trending" },
  { f: "2013_London_Marathon_at_Victoria_Embankment_(1).JPG",             l: "Marathon · Embankment" },
  { f: "Runners_of_the_2013_London_Marathon_(35).JPG",                    l: "Marathon · Runners" },
  { f: "Mr_Blobby_-_London_Marathon_2011_(5630053777).jpg",               l: "Marathon · Fancy Dress" },

  // UK weather — record May heat
  { f: "UK_heatwave_weather_warnings_July_2022.jpg",                      l: "UK · Record Heat" },
  { f: "Brighton_Wheel_on_the_beach_of_Brighton_in_summer_2013_(11).JPG", l: "Brighton · Bank Hol" },

  // Culture / Cannes / music festivals
  { f: "Roney_Villela_at_2025_Cannes_Red_Carpet_for_O_Agente_Secreto_1.jpg", l: "Cannes 2025" },
  { f: "MKr385841_Golshifteh_Farahani_(Alpha,_Cannes_2025).jpg",          l: "Cannes · Alpha" },
  { f: "Halle_Berry_at_the_2025_Cannes_Film_Festival_32.jpg",             l: "Cannes · Red Carpet" },
  { f: "View_of_Glastonbury_Festival_from_the_Park_Stage_as_crowd_arrives_for_Pulp,_2011.jpg", l: "Glastonbury" },
  { f: "Crowds_for_Brian_Wilson_at_the_Pyramid_(323798990).jpg",          l: "Festival Crowd" },
  { f: "Israeli_Pavilion,_2024.jpg",                                      l: "Venice Biennale" },

  // Marathon elite + extras
  { f: "Tsegaye_Kebede,_2013_London_Marathon.JPG",                        l: "Marathon · Elite" },
  { f: "Etihad_Stadium,_Manchester_City_Football_Club_(Ank_Kumar,_Infosys)_18.jpg", l: "Stadium · Night" },
  { f: "Bank_underground_station,_Bank_of_England_building_entrance.JPG", l: "City of London" },
];

// ── Column-width presets — each set is for N tiles across one tall row ────────
// Slight variation in widths gives an organic, editorial feel.
const COL_PRESETS = {
  5: [
    "1.2fr 1fr 0.85fr 1fr 0.95fr",
    "0.9fr 1.15fr 1fr 0.9fr 1.1fr",
    "1fr 0.9fr 1.2fr 1fr 0.95fr",
    "1.1fr 0.95fr 1fr 1.1fr 0.85fr",
  ],
  6: [
    "1.1fr 0.9fr 1fr 0.85fr 1fr 1.1fr",
    "0.9fr 1fr 1.15fr 1fr 0.85fr 1.1fr",
    "1fr 1.1fr 0.9fr 1.05fr 0.95fr 1fr",
  ],
  7: [
    "1fr 0.85fr 1.1fr 0.9fr 1fr 0.9fr 1.1fr",
    "1.1fr 1fr 0.85fr 1fr 0.9fr 1.1fr 0.95fr",
  ],
};

// Height options — varies slightly each shuffle for extra energy
const HEIGHTS = [440, 460, 480, 500];

function url(f) {
  return "https://commons.wikimedia.org/w/index.php?title=Special:Redirect/file/"
    + encodeURIComponent(f) + "&width=800";
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function render() {
  // Pick a random tile count (5, 6, or 7)
  const counts = [5, 6, 6, 7]; // weighted towards 6
  const n = pick(counts);
  const cols = pick(COL_PRESETS[n]);
  const h = pick(HEIGHTS);

  const images = shuffle(POOL).slice(0, n);
  const collage = document.getElementById('collage');

  collage.style.setProperty('--cols', cols);
  collage.style.setProperty('--h', h + 'px');
  collage.innerHTML = '';

  images.forEach(item => {
    const tile = document.createElement('div');
    tile.className = 'tile';

    const img = document.createElement('img');
    img.src = url(item.f);
    img.alt = item.l;
    img.onload = () => img.classList.add('loaded');
    img.onerror = () => { img.style.display = 'none'; };

    const lbl = document.createElement('span');
    lbl.className = 'lbl';
    lbl.textContent = item.l;

    tile.append(img, lbl);

    // Click to open lightbox
    tile.addEventListener('click', () => {
      if (!img.classList.contains('loaded')) return;
      document.getElementById('lb-img').src = img.src;
      document.getElementById('lb-lbl').textContent = item.l;
      document.getElementById('lightbox').classList.add('open');
    });

    collage.appendChild(tile);
  });
}

// Lightbox close
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.getElementById('lb-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

document.getElementById('btn-shuffle').onclick = render;
render();
</script>
</body>
</html>
