<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digest Collage · 25 May 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a18;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    gap: 1rem;
  }
  h1 { font-size: 0.75rem; color: #9a9894; letter-spacing: 0.1em; text-transform: uppercase; }

  /* 2 rows of 5 — column widths vary slightly per row for organic feel */
  .collage {
    display: grid;
    width: min(820px, 100vw);
    gap: 2px;
    background: #0e0e0d;
    border-radius: 2px;
    overflow: hidden;
    grid-template-columns: var(--cols-top, repeat(5, 1fr));
    grid-template-rows: 200px 200px;
  }

  /* Bottom row tiles override the column widths */
  .row2 {
    display: contents;
  }

  .tile {
    position: relative;
    overflow: hidden;
    background: #1e1e1c;
  }
  .tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    transition: opacity 0.35s;
    opacity: 0;
  }
  .tile img.loaded { opacity: 1; }
  .tile .lbl {
    position: absolute;
    bottom: 7px;
    left: 7px;
    background: rgba(0,0,0,0.6);
    color: rgba(255,255,255,0.88);
    font-size: 8.5px;
    font-weight: 700;
    letter-spacing: 0.07em;
    padding: 3px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    pointer-events: none;
  }

  .controls { display: flex; gap: 0.6rem; }
  button {
    padding: 0.45rem 1.2rem;
    border: 1px solid #3a3a38;
    border-radius: 5px;
    font-size: 0.78rem;
    cursor: pointer;
    font-family: inherit;
    background: #2a2a28;
    color: #e8e6e1;
    transition: background 0.15s;
  }
  button:hover { background: #3a3a38; }
</style>
</head>
<body>

<h1>Firas's Digest · 25 May 2026</h1>

<div class="collage" id="collage">
  <!-- 10 tiles, filled by JS -->
</div>

<div class="controls">
  <button id="btn-reshuffle">↺ Reshuffle</button>
  <button id="btn-refresh">⟳ New images</button>
</div>

<script>
// ── Pool ──────────────────────────────────────────────────────────────────────
// All filenames verified from Wikimedia Commons search results
const POOL = [
  // Geopolitics
  { f: "USCGC_Aquidneck_in_Strait_of_Hormuz_201202-N-IE405-2219.JPG",   l: "Iran · Hormuz" },
  { f: "Hormuz_map.png",                                                  l: "Strait · Map" },
  { f: "Ekrem_Imamoglu_campaigning_on_May_23,_2019.jpg",                 l: "Turkey · CHP" },
  { f: "Lebanese_Armed_Forces.jpg",                                       l: "Lebanon · South" },
  { f: "2006_Lebanon-Israel_War_Memorial.JPG",                            l: "Lebanon · War" },

  // UK politics / trending
  { f: "Nigel_Farage_(cropped).jpg",                                      l: "Farage · Trending" },
  { f: "Nigel_Farage_MEP_1,_Strasbourg_-_Diliff.jpg",                    l: "Farage · Reform" },

  // Markets / economy
  { f: "Bank_of_England_Building,_London,_UK_-_Diliff.jpg",              l: "Gilt · 5.53%" },
  { f: "Oil_tanker_MV_Houston.JPG",                                       l: "Brent · $105" },
  { f: "Crude_Oil_Tanker_Pericles_at_BP_Oil_Refinery_Jetty_and_General_Cargo_Ship_Jannes_at_Kwinana_Bulk_Jetty,_December_2020_01.jpg", l: "Oil · Market" },

  // Health
  { f: "Ebola_virus_em.jpg",                                              l: "Ebola · DRC" },
  { f: "View_of_the_City_of_Kinshasa,_DRC.jpg",                          l: "Kinshasa · DRC" },

  // UK Charts — Apple Music top 5
  { f: "Olivia_Dean_-_4323.jpg",                                          l: "Olivia Dean · #1" },
  { f: "Sam_Fender_(2021)_(cropped).jpg",                                 l: "Sam Fender · #2" },
  { f: "Santan_Dave.jpg",                                                  l: "Dave & Tems · #3" },

  // TikTok sounds
  { f: "Aya_Nakamura_2023.jpg",                                           l: "Aya Nakamura · TT" },

  // Sport / Google trends
  { f: "Players'_tunnel_at_Tottenham_Hotspur_Stadium,_view_towards_pitch.jpg", l: "Spurs · Final Day" },
  { f: "View_of_Goodison_Park_(2).JPG",                                   l: "Everton · Drops" },
  { f: "Etihad_Stadium,_Manchester_City_Football_Club_(Ank_Kumar,_Infosys)_04.jpg", l: "Premier League" },
  { f: "2023_London_Marathon_-_Frank_Lara_(2).jpg",                       l: "London Marathon" },
  { f: "2023_London_Marathon_-_Sean_Frame_(3).jpg",                       l: "Marathon · Trending" },
  { f: "Goodisonview1.JPG",                                               l: "Goodison Park" },

  // Weather / social mood
  { f: "London_Snow_08_02_07.JPG",                                        l: "UK · Coldest May" },
  { f: "London_trams_in_snow_c2010.JPG",                                  l: "UK · Snow" },

  // Cultural
  { f: "Israeli_Pavilion,_2024.jpg",                                      l: "Venice Biennale" },
];

function url(f) {
  return "https://commons.wikimedia.org/w/index.php?title=Special:Redirect/file/"
    + encodeURIComponent(f) + "&width=640";
}

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

let current = [];

function pickTen() {
  const used = new Set(current.map(x => x.f));
  const fresh = shuffle(POOL.filter(x => !used.has(x.f)));
  const pool = fresh.length >= 10 ? fresh : shuffle(POOL);
  current = pool.slice(0, 10);
  return current;
}

// Vary column widths slightly for an organic, non-grid feel
const colSets = [
  "1fr 1.1fr 0.9fr 1fr 1fr",
  "1.1fr 0.9fr 1fr 1.1fr 0.9fr",
  "0.9fr 1fr 1.1fr 0.9fr 1.1fr",
  "1fr 1fr 0.9fr 1.1fr 1fr",
  "1.1fr 1fr 1fr 0.9fr 1.1fr",
];

function render(items) {
  const collage = document.getElementById('collage');
  // Pick random column widths
  collage.style.gridTemplateColumns = colSets[Math.floor(Math.random() * colSets.length)];
  collage.innerHTML = '';

  items.forEach((item, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';

    const img = document.createElement('img');
    img.src = url(item.f);
    img.alt = item.l;
    img.onload = () => img.classList.add('loaded');
    img.onerror = () => { img.style.opacity = 0; };

    const lbl = document.createElement('span');
    lbl.className = 'lbl';
    lbl.textContent = item.l;

    tile.appendChild(img);
    tile.appendChild(lbl);
    collage.appendChild(tile);
  });
}

function reshuffle() {
  render(shuffle(current));
}

function refresh() {
  render(pickTen());
}

document.getElementById('btn-reshuffle').onclick = reshuffle;
document.getElementById('btn-refresh').onclick = refresh;

// Initial load
refresh();
</script>
</body>
</html>
