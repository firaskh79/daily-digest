<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cultural Intelligence — Trends</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1f1f2e;
    --border-hover: #2e2e44;
    --text: #e8e6e3;
    --muted: #6b7280;
    --purple: #a78bfa;
    --blue: #60a5fa;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --pink: #f472b6;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 24px 80px;
    line-height: 1.6;
  }
  .container { max-width: 860px; margin: 0 auto; }

  /* Header */
  .page-header { margin-bottom: 48px; }
  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--muted); text-decoration: none; font-size: 0.85rem;
    margin-bottom: 20px; transition: color 0.2s;
  }
  .back-link:hover { color: var(--text); }
  h1 {
    font-size: 2rem; font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--purple), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .date-sub { color: var(--muted); font-size: 0.95rem; }
  .mood-badge {
    display: inline-block; margin-top: 12px;
    padding: 4px 14px; border-radius: 20px; font-size: 0.8rem;
    font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  }

  /* Nav tabs */
  .tabs {
    display: flex; gap: 4px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px; padding-bottom: 0;
  }
  .tab-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 0.85rem; font-weight: 500;
    padding: 10px 16px; border-radius: 8px 8px 0 0;
    transition: color 0.2s, background 0.2s;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface); }
  .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }

  /* Sections */
  .section { display: none; }
  .section.active { display: block; }

  /* Cards */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border-hover); }
  .card-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .card-headline { font-size: 1rem; font-weight: 600; color: var(--text);
    margin-bottom: 10px; line-height: 1.4; }
  .card-body { font-size: 0.9rem; color: #a8a6a4; line-height: 1.65; }

  /* Tags */
  .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 500;
    background: #ffffff0d; color: var(--muted); border: 1px solid var(--border);
  }

  /* Intensity bar */
  .intensity-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .intensity-label { font-size: 0.75rem; color: var(--muted); width: 60px; }
  .intensity-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
  .intensity-fill { height: 100%; border-radius: 2px; }

  /* Music chart */
  .chart-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    transition: background 0.15s; border-radius: 8px;
  }
  .chart-row:last-child { border-bottom: none; }
  .chart-row:hover { background: #ffffff05; }
  .pos-num { font-size: 0.85rem; font-weight: 700; color: var(--muted); width: 24px; text-align: right; }
  .pos-num.top3 { color: var(--amber); }
  .change-badge { font-size: 0.7rem; width: 20px; text-align: center; }
  .track-info { flex: 1; }
  .track-title { font-size: 0.95rem; font-weight: 600; }
  .track-artist { font-size: 0.82rem; color: var(--muted); }
  .uk-badge { font-size: 0.65rem; background: var(--blue)22; color: var(--blue);
    border: 1px solid var(--blue)44; padding: 2px 7px; border-radius: 10px; margin-left: 6px; }
  .mood-tags-inline { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

  /* Trends grid */
  .trends-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  .trend-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .trend-rank { font-size: 1.5rem; font-weight: 800; color: var(--purple); margin-bottom: 4px; }
  .trend-term { font-size: 0.9rem; font-weight: 600; }
  .trend-vol { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* TikTok */
  .tiktok-card { display: flex; gap: 14px; align-items: flex-start; }
  .tiktok-score {
    flex-shrink: 0; width: 54px; height: 54px; border-radius: 12px;
    background: linear-gradient(135deg, #ff006644, #ff69b444);
    border: 1px solid #ff006644;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 800; color: var(--pink);
  }
  .tiktok-meta { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  /* Cultural acts */
  .act-header { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }
  .act-avatar {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--purple)44, var(--blue)44);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; font-weight: 700; color: var(--purple);
  }
  .act-name { font-size: 1rem; font-weight: 700; }
  .act-context { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .reach-badge {
    display: inline-block; margin-left: 8px; padding: 2px 8px;
    border-radius: 10px; font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase; vertical-align: middle;
  }
  .reach-viral { background: #f4725022; color: #f47250; border: 1px solid #f4725044; }
  .reach-major { background: var(--amber)22; color: var(--amber); border: 1px solid var(--amber)44; }
  .reach-industry { background: var(--muted)22; color: var(--muted); border: 1px solid var(--muted)44; }
  .backlash-note {
    margin-top: 10px; padding: 10px 14px;
    background: var(--red)11; border: 1px solid var(--red)33;
    border-radius: 8px; font-size: 0.82rem; color: #fca5a5;
  }

  /* Streets */
  .protest-scale {
    display: inline-block; padding: 3px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 600;
    background: var(--amber)22; color: var(--amber); border: 1px solid var(--amber)44;
    margin-bottom: 8px;
  }

  /* Discourse */
  .figure-card { display: flex; gap: 14px; }
  .figure-lean {
    flex-shrink: 0; padding: 4px 10px; border-radius: 6px;
    font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; align-self: flex-start; margin-top: 2px;
  }
  .lean-academic { background: var(--blue)22; color: var(--blue); border: 1px solid var(--blue)44; }
  .lean-nationalist { background: var(--amber)22; color: var(--amber); border: 1px solid var(--amber)44; }
  .convergent { background: var(--green)22; color: var(--green); border: 1px solid var(--green)44; }
  .divergent { background: var(--red)22; color: var(--red); border: 1px solid var(--red)44; }

  /* Synthesis */
  .synthesis-theme {
    font-size: 1.1rem; font-weight: 600; line-height: 1.5;
    padding: 20px; background: var(--purple)11; border: 1px solid var(--purple)33;
    border-radius: 12px; margin-bottom: 20px; color: #d8b4fe;
  }
  .connection-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 14px;
  }
  .connection-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .connection-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); width: 90px; flex-shrink: 0; padding-top: 2px; }
  .connection-val { font-size: 0.9rem; color: var(--text); }
  .confidence-badge {
    display: inline-block; margin-left: 8px; padding: 2px 8px;
    border-radius: 10px; font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .conf-strong { background: var(--green)22; color: var(--green); border: 1px solid var(--green)44; }
  .conf-moderate { background: var(--amber)22; color: var(--amber); border: 1px solid var(--amber)44; }
  .conf-speculative { background: var(--muted)22; color: var(--muted); border: 1px solid var(--muted)44; }

  /* Leading signals */
  .signal-item {
    display: flex; gap: 14px; padding: 14px;
    background: var(--green)09; border: 1px solid var(--green)22;
    border-radius: 10px; margin-bottom: 10px;
  }
  .signal-icon { font-size: 1.2rem; flex-shrink: 0; }
  .signal-text { font-size: 0.9rem; color: #a8a6a4; line-height: 1.6; }

  /* Silence */
  .silence-card {
    background: #ff000009; border: 1px solid var(--red)22;
    border-radius: 12px; padding: 20px;
  }
  .silence-title { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--red); margin-bottom: 10px; }

  /* Media */
  .media-card { }
  .geo-badge {
    display: inline-block; padding: 2px 9px; border-radius: 10px;
    font-size: 0.7rem; font-weight: 600;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    margin-bottom: 8px;
  }
  .diverges-note {
    margin-top: 10px; padding: 10px 14px;
    background: var(--blue)09; border: 1px solid var(--blue)22;
    border-radius: 8px; font-size: 0.82rem; color: #93c5fd;
  }

  .loading { color: var(--muted); text-align: center; padding: 80px 0; font-size: 0.95rem; }
  .error-msg { color: var(--red); text-align: center; padding: 80px 0; }

  /* Section title */
  .section-title {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 16px; margin-top: 28px;
  }
  .section-title:first-child { margin-top: 0; }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <a class="back-link" href="../index.html">← All Digests</a>
    <h1 id="page-title">Cultural Intelligence</h1>
    <div class="date-sub" id="page-date">Loading...</div>
    <div id="mood-badge"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div id="content"><div class="loading">Loading trends data…</div></div>
</div>

<script>
const TABS = [
  { id: 'macro', label: '🌍 Macro' },
  { id: 'music', label: '🎵 Music' },
  { id: 'acts', label: '🎭 Cultural Acts' },
  { id: 'streets', label: '✊ Streets' },
  { id: 'discourse', label: '💬 Discourse' },
  { id: 'media', label: '📰 Media' },
  { id: 'synthesis', label: '🔭 Synthesis' },
];

const moodColors = {
  conflicted: { bg: '#f47250', text: '#fff', bgLight: '#f4725022', border: '#f4725044' },
  anxious:    { bg: '#fbbf24', text: '#000', bgLight: '#fbbf2422', border: '#fbbf2444' },
  volatile:   { bg: '#f87171', text: '#fff', bgLight: '#f8717122', border: '#f8717144' },
  defiant:    { bg: '#a78bfa', text: '#fff', bgLight: '#a78bfa22', border: '#a78bfa44' },
  hopeful:    { bg: '#34d399', text: '#000', bgLight: '#34d39922', border: '#34d39944' },
};

function intensityColor(n) {
  if (n >= 8) return '#f87171';
  if (n >= 6) return '#fbbf24';
  return '#34d399';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tags(arr) {
  if (!arr || !arr.length) return '';
  return `<div class="tags">${arr.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`;
}

function reachClass(r) {
  if (!r) return '';
  if (r.includes('viral')) return 'reach-viral';
  if (r.includes('major')) return 'reach-major';
  return 'reach-industry';
}

function confidenceClass(c) {
  if (!c) return '';
  if (c === 'strong') return 'conf-strong';
  if (c === 'moderate') return 'conf-moderate';
  return 'conf-speculative';
}

function renderMacro(d) {
  const m = d.macro;
  let html = '';

  // Google Trends
  if (m.google_trends_uk && m.google_trends_uk.length) {
    html += `<div class="section-title">Google Trends UK</div>`;
    html += `<div class="trends-grid">`;
    m.google_trends_uk.forEach(t => {
      html += `<div class="trend-card">
        <div class="trend-rank">#${t.rank}</div>
        <div class="trend-term">${esc(t.term)}</div>
        <div class="trend-vol">${esc(t.volume_est)}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Politics
  if (m.politics && m.politics.length) {
    html += `<div class="section-title">Politics</div>`;
    m.politics.forEach(p => {
      const col = intensityColor(p.intensity);
      html += `<div class="card">
        <div class="card-headline">${esc(p.headline)}</div>
        <div class="intensity-row">
          <span class="intensity-label" style="color:${col}">Intensity ${p.intensity}/10</span>
          <div class="intensity-bar"><div class="intensity-fill" style="width:${p.intensity*10}%;background:${col}"></div></div>
          <span class="tag">${esc(p.sentiment)}</span>
        </div>
        ${tags(p.tags)}
      </div>`;
    });
  }

  // Economics
  if (m.economics && m.economics.length) {
    html += `<div class="section-title">Economics</div>`;
    m.economics.forEach(e => {
      const col = intensityColor(e.intensity);
      html += `<div class="card">
        <div class="card-headline">${esc(e.headline)}</div>
        <div class="intensity-row">
          <span class="intensity-label" style="color:${col}">Intensity ${e.intensity}/10</span>
          <div class="intensity-bar"><div class="intensity-fill" style="width:${e.intensity*10}%;background:${col}"></div></div>
          <span class="tag">${esc(e.sentiment)}</span>
        </div>
        ${tags(e.tags)}
      </div>`;
    });
  }

  return html;
}

function renderMusic(d) {
  const mu = d.culture.music;
  let html = '';

  // Apple Music chart
  if (mu.apple_music_uk_top12 && mu.apple_music_uk_top12.length) {
    html += `<div class="section-title">Apple Music UK Top 12</div>`;
    html += `<div class="card" style="padding:8px 4px">`;
    mu.apple_music_uk_top12.forEach(t => {
      const chg = t.change > 0 ? `<span style="color:#34d399">▲${t.change}</span>` :
                  t.change < 0 ? `<span style="color:#f87171">▼${Math.abs(t.change)}</span>` :
                  `<span style="color:#6b7280">—</span>`;
      html += `<div class="chart-row">
        <div class="pos-num ${t.pos<=3?'top3':''}">${t.pos}</div>
        <div class="change-badge">${chg}</div>
        <div class="track-info">
          <div class="track-title">${esc(t.title)}${t.uk_artist?'<span class="uk-badge">UK</span>':''}</div>
          <div class="track-artist">${esc(t.artist)}</div>
          <div class="mood-tags-inline">${(t.mood_tags||[]).join(' · ')}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // TikTok sounds
  if (mu.tiktok_sounds && mu.tiktok_sounds.length) {
    html += `<div class="section-title">TikTok Sounds</div>`;
    mu.tiktok_sounds.forEach(s => {
      html += `<div class="card">
        <div class="tiktok-card">
          <div class="tiktok-score">${s.score}</div>
          <div>
            <div class="track-title">${esc(s.title)}</div>
            <div class="track-artist">${esc(s.artist)}</div>
            <div class="tiktok-meta">${(s.videos||0).toLocaleString()} videos · ${(s.views||0).toLocaleString()} views</div>
            ${tags(s.mood_tags)}
          </div>
        </div>
      </div>`;
    });
  }

  // New releases
  if (mu.new_releases && mu.new_releases.length) {
    html += `<div class="section-title">Upcoming Releases</div>`;
    mu.new_releases.forEach(r => {
      html += `<div class="card">
        <div class="card-title">${esc(r.release_date)}</div>
        <div class="card-headline">${esc(r.artist)} — <em>${esc(r.title)}</em></div>
        ${tags(r.tags)}
      </div>`;
    });
  }

  // Film
  if (d.culture.film) {
    const f = d.culture.film;
    if (f.cannes_picks && f.cannes_picks.length) {
      html += `<div class="section-title">Cannes Picks</div>`;
      f.cannes_picks.forEach(p => {
        html += `<div class="card">
          <div class="card-headline">${esc(p.title)}</div>
          <div class="card-body">dir. ${esc(p.director)}</div>
          ${tags(p.theme_tags)}
        </div>`;
      });
    }
  }

  return html;
}

function renderActs(d) {
  if (!d.cultural_acts || !d.cultural_acts.length) return '<div class="loading">No cultural acts data.</div>';
  let html = '';
  d.cultural_acts.forEach(a => {
    const initials = a.figure.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const reach = a.reach || '';
    html += `<div class="card">
      <div class="act-header">
        <div class="act-avatar">${initials}</div>
        <div>
          <div class="act-name">${esc(a.figure)}
            ${reach ? `<span class="reach-badge ${reachClass(reach)}">${esc(reach)}</span>` : ''}
          </div>
          <div class="act-context">${esc(a.context)}</div>
        </div>
      </div>
      <div class="card-body">${esc(a.event_description)}</div>
      ${a.backlash ? `<div class="backlash-note">⚡ ${esc(a.backlash)}</div>` : ''}
      ${a.vs_discourse ? `<div class="card-body" style="margin-top:10px;font-style:italic;color:#9ca3af">${esc(a.vs_discourse)}</div>` : ''}
      ${tags(a.topics)}
    </div>`;
  });
  return html;
}

function renderStreets(d) {
  if (!d.streets) return '<div class="loading">No streets data.</div>';
  let html = '';
  if (d.streets.summary) {
    html += `<div class="synthesis-theme">${esc(d.streets.summary)}</div>`;
  }
  (d.streets.protests || []).forEach(p => {
    html += `<div class="card">
      <div class="card-title">${esc(p.location)}</div>
      <div class="card-headline">${esc(p.cause)}</div>
      <div class="protest-scale">${esc(p.scale)}</div>
      <div class="card-body">${esc(p.explicit_demand)}</div>
      ${p.counter_protest ? `<div class="card-body" style="margin-top:8px;color:#9ca3af">Counter: ${esc(p.counter_protest)}</div>` : ''}
    </div>`;
  });
  return html;
}

function renderDiscourse(d) {
  if (!d.discourse) return '<div class="loading">No discourse data.</div>';
  let html = '';

  if (d.discourse.convergence_points && d.discourse.convergence_points.length) {
    html += `<div class="section-title">Convergence Points</div>`;
    d.discourse.convergence_points.forEach(c => {
      html += `<div class="card" style="border-color:#34d39922;background:#34d39907">
        <div class="card-title">Convergent: ${esc(c.topic)}</div>
        <div class="card-body" style="margin-bottom:8px"><strong style="color:#e8e6e3">Realist:</strong> ${esc(c.realist_argument)}</div>
        <div class="card-body" style="margin-bottom:8px"><strong style="color:#e8e6e3">Nationalist:</strong> ${esc(c.nationalist_argument)}</div>
        <div class="card-body" style="font-style:italic;color:#9ca3af">${esc(c.why_it_matters)}</div>
      </div>`;
    });
  }

  if (d.discourse.realist_academics && d.discourse.realist_academics.length) {
    html += `<div class="section-title">Realist Academics</div>`;
    d.discourse.realist_academics.forEach(f => {
      html += `<div class="card">
        <div class="figure-card">
          <span class="figure-lean lean-academic">Academic</span>
          <div>
            <div class="act-name">${esc(f.figure)}</div>
            <div class="act-context">${esc(f.platform)}</div>
            ${f.recent_content_title ? `<div class="card-body" style="margin-top:6px;font-style:italic">"${esc(f.recent_content_title)}"</div>` : ''}
            <div class="card-body" style="margin-top:8px">${esc(f.on_current_events)}</div>
            ${tags(f.narrative_tags)}
          </div>
        </div>
      </div>`;
    });
  }

  if (d.discourse.nationalist_media && d.discourse.nationalist_media.length) {
    html += `<div class="section-title">Nationalist / Partisan Media</div>`;
    d.discourse.nationalist_media.forEach(f => {
      html += `<div class="card">
        <div class="figure-card">
          <span class="figure-lean lean-nationalist">Media</span>
          <div>
            <div class="act-name">${esc(f.figure)} <span style="color:var(--muted);font-weight:400;font-size:0.85rem">— ${esc(f.outlet)}</span></div>
            <div class="card-body" style="margin-top:8px">${esc(f.framing)}</div>
            ${tags(f.topics)}
          </div>
        </div>
      </div>`;
    });
  }

  return html;
}

function renderMedia(d) {
  let html = '';
  if (d.media_framing && d.media_framing.length) {
    html += `<div class="section-title">Media Framing</div>`;
    d.media_framing.forEach(m => {
      html += `<div class="card">
        <div class="geo-badge">${esc(m.geo)}</div>
        <div class="card-title">${esc(m.outlet)}</div>
        <div class="card-headline">${esc(m.lead_story)}</div>
        <div class="card-body">${esc(m.framing)}</div>
        ${m.divergence_note ? `<div class="diverges-note">ℹ️ ${esc(m.divergence_note)}</div>` : ''}
      </div>`;
    });
  }

  if (d.silence_detector && d.silence_detector.length) {
    html += `<div class="section-title">Silence Detector</div>`;
    d.silence_detector.forEach(s => {
      html += `<div class="silence-card">
        <div class="silence-title">🔇 What culture is not talking about</div>
        <div class="card-headline">${esc(s.macro_event)}</div>
        <div class="card-body" style="margin-top:8px">${esc(s.observation)}</div>
        ${tags(s.registers_silent)}
      </div>`;
    });
  }

  return html;
}

function renderSynthesis(d) {
  if (!d.synthesis) return '<div class="loading">No synthesis data.</div>';
  const s = d.synthesis;
  let html = '';

  html += `<div class="synthesis-theme">${esc(s.daily_theme)}</div>`;

  if (s.mechanism) {
    html += `<div class="card">
      <div class="section-title">Mechanism</div>
      <div class="card-body">${esc(s.mechanism)}</div>
    </div>`;
  }

  if (s.leading_signals && s.leading_signals.length) {
    html += `<div class="section-title">Leading Signals</div>`;
    s.leading_signals.forEach(sig => {
      html += `<div class="signal-item">
        <div class="signal-icon">📡</div>
        <div class="signal-text">${esc(sig)}</div>
      </div>`;
    });
  }

  if (s.connections && s.connections.length) {
    html += `<div class="section-title">Connections</div>`;
    s.connections.forEach(c => {
      const confClass = confidenceClass(c.confidence);
      html += `<div class="connection-card">
        <div class="connection-row">
          <div class="connection-label">Event</div>
          <div class="connection-val">${esc(c.macro_event)}</div>
        </div>
        <div class="connection-row">
          <div class="connection-label">Response</div>
          <div class="connection-val">${esc(c.cultural_response)}</div>
        </div>
        <div class="connection-row">
          <div class="connection-label">Mechanism</div>
          <div class="connection-val" style="color:#a8a6a4">${esc(c.mechanism)}</div>
        </div>
        <div class="connection-row">
          <div class="connection-label">Observation</div>
          <div class="connection-val" style="color:#9ca3af;font-style:italic">${esc(c.observation)}</div>
        </div>
        <div class="tags" style="margin-top:8px">
          ${confClass ? `<span class="confidence-badge ${confClass}">${esc(c.confidence)}</span>` : ''}
          ${(c.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
        </div>
      </div>`;
    });
  }

  return html;
}

const RENDERERS = {
  macro: renderMacro,
  music: renderMusic,
  acts: renderActs,
  streets: renderStreets,
  discourse: renderDiscourse,
  media: renderMedia,
  synthesis: renderSynthesis,
};

function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + id));
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  let date = params.get('date');
  if (!date) {
    // Try to infer from referrer or use today
    const today = new Date();
    date = today.toISOString().slice(0,10);
  }

  const jsonUrl = `data/trends-${date}.json`;

  let data;
  try {
    const res = await fetch(jsonUrl);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    data = await res.json();
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="error-msg">Could not load trends data for ${date}.<br><small>${e.message}</small></div>`;
    return;
  }

  // Header
  document.title = `Cultural Intelligence — ${date}`;
  document.getElementById('page-title').textContent = 'Cultural Intelligence';
  document.getElementById('page-date').textContent = date;
  const mood = data.mood_of_day || '';
  if (mood) {
    const mc = moodColors[mood] || { bgLight: '#ffffff11', border: '#ffffff22', text: '#e8e6e3' };
    document.getElementById('mood-badge').innerHTML =
      `<span class="mood-badge" style="background:${mc.bgLight};border:1px solid ${mc.border};color:${mc.text || '#e8e6e3'}">${mood}</span>`;
  }

  // Build tabs + sections
  const tabsEl = document.getElementById('tabs');
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = '';

  TABS.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.dataset.tab = t.id;
    btn.textContent = t.label;
    btn.onclick = () => switchTab(t.id);
    tabsEl.appendChild(btn);

    const sec = document.createElement('div');
    sec.className = 'section' + (i === 0 ? ' active' : '');
    sec.id = 'sec-' + t.id;
    sec.innerHTML = RENDERERS[t.id] ? RENDERERS[t.id](data) : '<div class="loading">No data.</div>';
    contentEl.appendChild(sec);
  });
}

init();
</script>
</body>
</html>
