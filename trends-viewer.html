<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cultural Trends</title>
<style>
  :root {
    --bg:#0a0a0f; --surface:#13131a; --surface2:#1a1a24;
    --border:#1f1f2e; --border2:#2e2e44;
    --text:#e8e6e3; --muted:#6b7280; --muted2:#4b5563;
    --purple:#a78bfa; --blue:#60a5fa; --green:#34d399;
    --amber:#fbbf24; --red:#f87171; --pink:#f472b6;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;padding:40px 24px 80px;}
  .wrap{max-width:900px;margin:0 auto;}

  /* Header */
  .page-header{margin-bottom:40px;}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);
    text-decoration:none;font-size:0.83rem;margin-bottom:18px;transition:color .2s;}
  .back:hover{color:var(--text);}
  h1{font-size:1.8rem;font-weight:700;letter-spacing:-.02em;
    background:linear-gradient(135deg,var(--purple),var(--blue));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
  .header-sub{color:var(--muted);font-size:0.88rem;}

  /* Tabs */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:32px;}
  .tab{background:none;border:none;cursor:pointer;color:var(--muted);
    font-size:0.85rem;font-weight:500;padding:10px 18px;
    border-bottom:2px solid transparent;margin-bottom:-1px;
    border-radius:6px 6px 0 0;transition:color .2s,background .2s;}
  .tab:hover{color:var(--text);background:var(--surface);}
  .tab.active{color:var(--purple);border-bottom-color:var(--purple);}

  .panel{display:none;} .panel.active{display:block;}

  /* Section titles */
  .sec{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin-bottom:14px;margin-top:28px;}
  .sec:first-child{margin-top:0;}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:18px;margin-bottom:12px;transition:border-color .2s;}
  .card:hover{border-color:var(--border2);}

  /* ── LONGITUDINAL ──────────────────────────────────── */

  /* Mood timeline */
  .mood-timeline{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .mood-day{display:flex;flex-direction:column;align-items:center;gap:5px;min-width:80px;}
  .mood-date{font-size:.65rem;color:var(--muted);}
  .mood-pill{padding:4px 12px;border-radius:20px;font-size:.72rem;
    font-weight:700;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
  .mood-theme{font-size:.7rem;color:var(--muted);text-align:center;
    max-width:90px;line-height:1.3;margin-top:2px;}

  /* Synthesis timeline */
  .synth-timeline{display:flex;flex-direction:column;gap:0;}
  .synth-item{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);}
  .synth-item:last-child{border-bottom:none;}
  .synth-date-col{flex-shrink:0;width:88px;}
  .synth-date{font-size:.75rem;font-weight:600;color:var(--muted);}
  .synth-day-label{font-size:.65rem;color:var(--muted2);}
  .synth-theme{font-size:.9rem;font-weight:500;line-height:1.5;color:var(--text);}
  .synth-new{font-size:.65rem;background:var(--purple)22;color:var(--purple);
    border:1px solid var(--purple)44;padding:1px 7px;border-radius:10px;
    margin-left:8px;vertical-align:middle;}

  /* Music chart momentum */
  .chart-table{width:100%;border-collapse:collapse;}
  .chart-table th{font-size:.65rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);padding:6px 8px;
    border-bottom:1px solid var(--border);text-align:left;}
  .chart-table th.center{text-align:center;}
  .chart-table td{padding:10px 8px;border-bottom:1px solid var(--border);
    font-size:.85rem;vertical-align:middle;}
  .chart-table tr:last-child td{border-bottom:none;}
  .chart-table tr:hover td{background:#ffffff04;}
  .track-name{font-weight:600;}
  .track-artist{font-size:.75rem;color:var(--muted);}
  .uk-dot{display:inline-block;width:7px;height:7px;border-radius:50%;
    background:var(--blue);margin-right:5px;vertical-align:middle;}

  /* Sparkline cell */
  .spark-cell{text-align:center;}
  .pos-dot{display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:6px;font-size:.72rem;font-weight:700;}
  .pos-1{background:var(--amber)33;color:var(--amber);}
  .pos-top{background:var(--purple)22;color:var(--purple);}
  .pos-mid{background:var(--surface2);color:var(--muted);}
  .pos-absent{color:var(--muted2);font-size:.7rem;}

  /* Persistence bar */
  .persist-bar{display:flex;gap:3px;align-items:center;}
  .persist-seg{height:6px;flex:1;border-radius:2px;}
  .persist-seg.on{background:var(--purple);}
  .persist-seg.off{background:var(--border2);}
  .persist-count{font-size:.72rem;color:var(--muted);margin-left:6px;flex-shrink:0;}

  /* Tag frequency */
  .tag-freq{display:flex;flex-direction:column;gap:8px;}
  .tag-freq-row{display:flex;align-items:center;gap:10px;}
  .tag-freq-name{font-size:.82rem;width:160px;flex-shrink:0;}
  .tag-freq-bar-wrap{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
  .tag-freq-fill{height:100%;border-radius:4px;background:var(--purple);}
  .tag-freq-count{font-size:.72rem;color:var(--muted);width:30px;text-align:right;}

  /* Figures */
  .figure-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
  .figure-card{background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:14px;}
  .figure-name{font-size:.88rem;font-weight:600;margin-bottom:6px;}
  .figure-days{font-size:.72rem;color:var(--muted);margin-bottom:6px;}

  /* ── TODAY PANEL ────────────────────────────────────── */
  .today-tabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:20px;}
  .today-tab{background:none;border:1px solid var(--border);cursor:pointer;
    color:var(--muted);font-size:.78rem;padding:6px 12px;border-radius:20px;
    transition:all .2s;}
  .today-tab.active,.today-tab:hover{background:var(--purple)22;
    color:var(--purple);border-color:var(--purple)44;}
  .today-panel{display:none;} .today-panel.active{display:block;}

  /* Shared small bits */
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;}
  .tag{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.68rem;
    background:#ffffff0d;color:var(--muted);border:1px solid var(--border);}
  .badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:.68rem;font-weight:600;}
  .badge-purple{background:var(--purple)22;color:var(--purple);border:1px solid var(--purple)44;}
  .badge-green{background:var(--green)22;color:var(--green);border:1px solid var(--green)44;}
  .badge-amber{background:var(--amber)22;color:var(--amber);border:1px solid var(--amber)44;}
  .badge-red{background:var(--red)22;color:var(--red);border:1px solid var(--red)44;}
  .badge-muted{background:var(--muted)11;color:var(--muted);border:1px solid var(--border);}
  .intensity-wrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
  .intensity-bar{flex:1;height:4px;background:var(--border);border-radius:2px;}
  .intensity-fill{height:100%;border-radius:2px;}
  .card-hl{font-size:.95rem;font-weight:600;line-height:1.4;margin-bottom:8px;}
  .card-body{font-size:.85rem;color:#a8a6a4;line-height:1.65;}
  .note-red{margin-top:10px;padding:10px 14px;background:var(--red)11;
    border:1px solid var(--red)33;border-radius:8px;font-size:.8rem;color:#fca5a5;}
  .note-blue{margin-top:10px;padding:10px 14px;background:var(--blue)09;
    border:1px solid var(--blue)22;border-radius:8px;font-size:.8rem;color:#93c5fd;}
  .chart-link{display:flex;align-items:center;gap:12px;padding:11px 14px;
    border-bottom:1px solid var(--border);text-decoration:none;color:inherit;
    border-radius:8px;transition:background .15s;}
  .chart-link:last-child{border-bottom:none;}
  .chart-link:hover{background:#ffffff06;}
  .pos-n{font-size:.85rem;font-weight:700;color:var(--muted);width:22px;text-align:right;}
  .pos-n.gold{color:var(--amber);}
  .chg{font-size:.7rem;width:20px;text-align:center;}
  .track-inf{flex:1;}
  .t-title{font-size:.88rem;font-weight:600;}
  .t-artist{font-size:.75rem;color:var(--muted);}
  .t-mood{font-size:.7rem;color:var(--muted);margin-top:2px;}
  .uk-badge{font-size:.6rem;background:var(--blue)22;color:var(--blue);
    border:1px solid var(--blue)44;padding:1px 6px;border-radius:8px;margin-left:5px;}
  .play-icon{color:var(--muted);font-size:.75rem;flex-shrink:0;}
  .loading{color:var(--muted);text-align:center;padding:60px 0;font-size:.9rem;}
  .rtl-block{direction:rtl;text-align:right;font-size:.88rem;line-height:1.8;color:var(--text);}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-header">
    <a class="back" href="index.html">← All Digests</a>
    <h1>Cultural Trends</h1>
    <div class="header-sub" id="header-sub">Loading...</div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchMain('longitudinal')">📈 7-Day View</button>
    <button class="tab" onclick="switchMain('today')">📅 Today</button>
  </div>

  <!-- ═══ LONGITUDINAL PANEL ═══════════════════════════════════════ -->
  <div class="panel active" id="panel-longitudinal">
    <div id="long-content"><div class="loading">Loading last 7 days…</div></div>
  </div>

  <!-- ═══ TODAY PANEL ═══════════════════════════════════════════════ -->
  <div class="panel" id="panel-today">
    <div class="today-tabs">
      <button class="today-tab active" onclick="switchToday('macro')">🌍 Macro</button>
      <button class="today-tab" onclick="switchToday('music')">🎵 Music</button>
      <button class="today-tab" onclick="switchToday('acts')">🎭 Acts</button>
      <button class="today-tab" onclick="switchToday('streets')">✊ Streets</button>
      <button class="today-tab" onclick="switchToday('discourse')">💬 Discourse</button>
      <button class="today-tab" onclick="switchToday('media')">📰 Media</button>
      <button class="today-tab" onclick="switchToday('synthesis')">🔭 Synthesis</button>
    </div>
    <div id="today-content"><div class="loading">Loading…</div></div>
  </div>
</div>

<script>
// ─── Routing ──────────────────────────────────────────────────────────────────
function switchMain(id) {
  document.querySelectorAll('.tabs .tab').forEach((b,i)=>b.classList.toggle('active',['longitudinal','today'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
}
let currentToday='macro';
function switchToday(id) {
  currentToday=id;
  document.querySelectorAll('.today-tab').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(id.slice(0,4))||b.onclick.toString().includes(`'${id}'`)));
  if(allData.length) renderToday(allData[0]);
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const iColor=n=>n>=8?'var(--red)':n>=6?'var(--amber)':'var(--green)';
function tagsHtml(arr){return arr&&arr.length?`<div class="tags">${arr.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
const moodColors={
  conflicted:{bg:'#f4725022',border:'#f4725044',text:'#f47250'},
  anxious:{bg:'var(--amber)22',border:'var(--amber)44',text:'var(--amber)'},
  volatile:{bg:'var(--red)22',border:'var(--red)44',text:'var(--red)'},
  defiant:{bg:'var(--purple)22',border:'var(--purple)44',text:'var(--purple)'},
  hopeful:{bg:'var(--green)22',border:'var(--green)44',text:'var(--green)'},
  melancholic:{bg:'var(--blue)22',border:'var(--blue)44',text:'var(--blue)'},
};
function moodStyle(m){const c=moodColors[m]||{bg:'#ffffff11',border:'#ffffff22',text:'var(--muted)'};
  return `background:${c.bg};border:1px solid ${c.border};color:${c.text}`;}
const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

// ─── Data loading ─────────────────────────────────────────────────────────────
let allData=[];

async function loadDays(){
  const params=new URLSearchParams(location.search);
  // Try to find today's date from param or use UTC today
  let anchor=params.get('date');
  if(!anchor){const n=new Date();anchor=n.toISOString().slice(0,10);}

  try{
    const r=await fetch(`data/trends.json`);
    if(r.ok){
      const j=await r.json();
      allData=[j];
    }
  }catch{}


  if(!allData.length){
    document.getElementById('long-content').innerHTML='<div class="loading">No trend data found.</div>';
    document.getElementById('today-content').innerHTML='<div class="loading">No data.</div>';
    return;
  }

  document.getElementById('header-sub').textContent=
    `${allData.length} day${allData.length>1?'s':''} of cultural intelligence`;

  renderLongitudinal(allData);
  renderToday(allData[0]);
}

// ─── LONGITUDINAL VIEW ────────────────────────────────────────────────────────
function renderLongitudinal(days){
  let html='';

  // ── CONVERGENCE — front and centre ──────────────────────────────────────────
  const allConvergence=[];
  days.forEach(d=>{
    (d.discourse?.convergence_points||[]).forEach(c=>{
      allConvergence.push({date:d.date,data:c});
    });
  });
  if(allConvergence.length){
    html+=`<div class="sec" style="color:var(--green)">⚡ Convergence — Where the Spectrum Agrees</div>`;
    html+=`<div style="font-size:.78rem;color:var(--muted);margin-bottom:12px;margin-top:-10px">These are the rarest signals: topics where realists, nationalists, and the left arrive at the same conclusion from different directions.</div>`;
    allConvergence.forEach(({date,data:c})=>{
      html+=`<div class="card" style="border-color:var(--green)33;background:var(--green)07;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
          <div style="font-size:.95rem;font-weight:700;color:var(--green)">${esc(c.topic)}</div>
          <div style="font-size:.65rem;color:var(--muted);flex-shrink:0;margin-left:12px">${date}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">
          <div class="card-body"><span style="color:var(--blue);font-weight:600">Realist: </span>${esc(c.realist_argument)}</div>
          <div class="card-body"><span style="color:var(--amber);font-weight:600">Nationalist: </span>${esc(c.nationalist_argument)}</div>
        </div>
        <div style="padding:10px 14px;background:var(--green)11;border-radius:8px;font-size:.82rem;color:#86efac;line-height:1.6">
          <strong>Why this matters:</strong> ${esc(c.why_it_matters)}
        </div>
        ${c.figures_involved?.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">${c.figures_involved.map(f=>`<span class="badge badge-muted">${esc(f)}</span>`).join('')}</div>`:''}
      </div>`;
    });
  }

  // ── SILENCE DETECTOR — front and centre ────────────────────────────────────
  const allSilences=[];
  days.forEach(d=>{
    (d.silence_detector||[]).forEach(s=>{
      allSilences.push({date:d.date,data:s});
    });
  });
  // Group repeated silences (same macro_event across days)
  const silenceMap={};
  allSilences.forEach(({date,data:s})=>{
    const key=s.macro_event;
    if(!silenceMap[key])silenceMap[key]={event:s.macro_event,observation:s.observation,intensity:s.intensity,registers:s.registers_silent,dates:[]};
    silenceMap[key].dates.push(date);
  });
  const silences=Object.values(silenceMap).sort((a,b)=>b.dates.length-a.dates.length||b.intensity-a.intensity);
  if(silences.length){
    html+=`<div class="sec" style="color:var(--red);margin-top:28px">🔇 Silence — What Culture Is Not Talking About</div>`;
    html+=`<div style="font-size:.78rem;color:var(--muted);margin-bottom:12px;margin-top:-10px">Events of high intensity that have produced no signal in music, fashion, art, or social media. Absence is data.</div>`;
    silences.forEach(s=>{
      const persistent=s.dates.length>1;
      html+=`<div class="card" style="border-color:var(--red)33;background:var(--red)07;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div style="font-size:.92rem;font-weight:700;color:#fca5a5">${esc(s.event)}</div>
          <div style="display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:12px">
            ${persistent?`<span class="badge badge-red">${s.dates.length} days silent</span>`:`<span style="font-size:.65rem;color:var(--muted)">${s.dates[0]}</span>`}
          </div>
        </div>
        <div class="card-body" style="margin-bottom:10px">${esc(s.observation)}</div>
        <div style="font-size:.72rem;color:var(--muted)">Silent in: ${(s.registers||[]).map(r=>`<span class="tag">${esc(r)}</span>`).join(' ')}</div>
        <div style="margin-top:8px">
          <div style="font-size:.65rem;color:var(--muted);margin-bottom:4px">Intensity</div>
          <div class="intensity-bar" style="max-width:200px"><div class="intensity-fill" style="width:${s.intensity*10}%;background:var(--red)"></div></div>
        </div>
      </div>`;
    });
  }

  // ── Mood timeline
  html+=`<div class="sec" style="margin-top:28px">Mood of the Day</div>`;
  html+=`<div class="card"><div class="mood-timeline">`;
  days.forEach(d=>{
    const dt=new Date(d.date+'T00:00:00Z');
    const dayLabel=DAY_NAMES[dt.getUTCDay()];
    const mood=d.mood_of_day||'';
    html+=`<div class="mood-day">
      <div class="mood-date">${d.date.slice(5)} ${dayLabel}</div>
      <div class="mood-pill" style="${moodStyle(mood)}">${esc(mood)}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // ── Synthesis timeline
  html+=`<div class="sec">Daily Synthesis — What Each Day Meant</div>`;
  html+=`<div class="card"><div class="synth-timeline">`;
  days.forEach((d,i)=>{
    const dt=new Date(d.date+'T00:00:00Z');
    html+=`<div class="synth-item">
      <div class="synth-date-col">
        <div class="synth-date">${d.date.slice(5)}</div>
        <div class="synth-day-label">${DAY_NAMES[dt.getUTCDay()]}</div>
      </div>
      <div>
        <span class="synth-theme">${esc(d.synthesis?.daily_theme||'—')}</span>
        ${i===0?'<span class="synth-new">today</span>':''}
      </div>
    </div>`;
  });
  html+=`</div></div>`;

  // ── Music chart — 7-day positions
  html+=`<div class="sec">Music — Chart Positions Over Time</div>`;
  const trackMap={};
  days.forEach((d,di)=>{
    (d.culture?.music?.apple_music_uk_top12||[]).forEach(t=>{
      const key=`${t.artist}|||${t.title}`;
      if(!trackMap[key])trackMap[key]={artist:t.artist,title:t.title,uk:t.uk_artist,url:t.apple_music_url,days:new Array(days.length).fill(null)};
      trackMap[key].days[di]=t.pos;
    });
  });
  // Sort by most recent position (today's chart order), then by appearances
  const tracks=Object.values(trackMap).sort((a,b)=>{
    const ap=a.days[0]||99, bp=b.days[0]||99;
    if(ap!==bp)return ap-bp;
    const aa=a.days.filter(Boolean).length, ba=b.days.filter(Boolean).length;
    return ba-aa;
  });

  html+=`<div class="card" style="padding:8px 0;overflow-x:auto">`;
  html+=`<table class="chart-table"><thead><tr>
    <th>Track</th>
    ${days.map(d=>`<th class="center">${d.date.slice(5)}</th>`).join('')}
    <th>Days in chart</th>
  </tr></thead><tbody>`;
  tracks.forEach(t=>{
    const appearances=t.days.filter(Boolean).length;
    const posClass=p=>p===1?'pos-1':p<=5?'pos-top':'pos-mid';
    html+=`<tr>
      <td><div class="track-name">${t.uk?'<span class="uk-dot"></span>':''}<a href="${esc(t.url||`https://music.apple.com/gb/search?term=${encodeURIComponent((t.artist||'')+' '+(t.title||''))}`)+'"'} target="_blank" style="color:inherit;text-decoration:none;">${esc(t.title)}</a></div>
        <div class="track-artist">${esc(t.artist)}</div></td>
      ${t.days.map(p=>p
        ?`<td class="spark-cell"><div class="pos-dot ${posClass(p)}">${p}</div></td>`
        :`<td class="spark-cell"><span class="pos-absent">·</span></td>`
      ).join('')}
      <td>
        <div class="persist-bar">
          ${t.days.map(p=>`<div class="persist-seg ${p?'on':'off'}"></div>`).join('')}
          <span class="persist-count">${appearances}d</span>
        </div>
      </td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;

  // ── Recurring political themes
  html+=`<div class="sec">Recurring Political Themes</div>`;
  const tagCounts={};
  days.forEach(d=>{
    [...(d.macro?.politics||[]),...(d.macro?.economics||[])].forEach(item=>{
      (item.tags||[]).forEach(tag=>{tagCounts[tag]=(tagCounts[tag]||0)+1;});
    });
  });
  const sortedTags=Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,15);
  const maxTag=sortedTags[0]?.[1]||1;
  html+=`<div class="card"><div class="tag-freq">`;
  sortedTags.forEach(([tag,count])=>{
    html+=`<div class="tag-freq-row">
      <div class="tag-freq-name">${esc(tag)}</div>
      <div class="tag-freq-bar-wrap"><div class="tag-freq-fill" style="width:${(count/maxTag*100).toFixed(0)}%"></div></div>
      <div class="tag-freq-count">${count}d</div>
    </div>`;
  });
  html+=`</div></div>`;

  // ── Narrative Landscape — position tracking across figures and time
  html+=`<div class="sec" style="margin-top:28px">🗺️ Narrative Landscape — Where the Fault Lines Actually Are</div>`;
  html+=`<div style="font-size:.78rem;color:var(--muted);margin-bottom:16px;margin-top:-10px">Not who is producing content — but where their positions converge unexpectedly or diverge from classical alignment. ⚡ = breaks the classical expectation.</div>`;

  // Collect all key topics and all figures with positions across days
  const topicSet=new Set();
  const figurePositions={}; // figurePositions[figure][topic] = [{date, stance, framing, unexpected}]

  days.forEach(d=>{
    const topics=d.discourse?.key_topics||[];
    topics.forEach(t=>topicSet.add(t));
    (d.discourse?.narrative_positions||[]).forEach(fp=>{
      if(!figurePositions[fp.figure])figurePositions[fp.figure]={type:fp.type,positions:{}};
      Object.entries(fp.positions||{}).forEach(([topic,pos])=>{
        topicSet.add(topic);
        if(!figurePositions[fp.figure].positions[topic])figurePositions[fp.figure].positions[topic]=[];
        figurePositions[fp.figure].positions[topic].push({date:d.date,...pos});
      });
    });
  });

  const topics=[...topicSet];
  const figures=Object.entries(figurePositions);

  if(figures.length && topics.length){
    // For each topic: show who holds what position and flag unexpected ones
    topics.forEach(topic=>{
      const figuresOnTopic=figures.filter(([,fp])=>fp.positions[topic]?.length);
      if(!figuresOnTopic.length)return;

      // Group by stance (most recent day)
      const stanceGroups={};
      figuresOnTopic.forEach(([name,fp])=>{
        const latest=fp.positions[topic][0]; // most recent
        const stance=latest.stance||'unknown';
        if(!stanceGroups[stance])stanceGroups[stance]=[];
        stanceGroups[stance].push({name,type:fp.type,latest,all:fp.positions[topic]});
      });

      // Check for unexpected convergence (different types, same stance)
      const stances=Object.keys(stanceGroups);
      let hasUnexpected=false;
      stances.forEach(stance=>{
        const types=stanceGroups[stance].map(f=>f.type);
        const hasMultipleTypes=new Set(types).size>1;
        const anyUnexpected=stanceGroups[stance].some(f=>f.latest.unexpected);
        if(hasMultipleTypes&&anyUnexpected)hasUnexpected=true;
      });

      const borderColor=hasUnexpected?'var(--amber)':'var(--border)';
      const bgColor=hasUnexpected?'var(--amber)07':'transparent';

      html+=`<div class="card" style="border-color:${borderColor};background:${bgColor};margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <div style="font-size:.95rem;font-weight:700">${esc(topic)}</div>
          ${hasUnexpected?`<span class="badge badge-amber">⚡ unexpected convergence</span>`:''}
        </div>`;

      // Show each stance group
      Object.entries(stanceGroups).forEach(([stance,figs])=>{
        const types=[...new Set(figs.map(f=>f.type))];
        const crossIdeological=types.length>1;
        const anyUnexpected=figs.some(f=>f.latest.unexpected);

        html+=`<div style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
              color:${stance.includes('anti')||stance.includes('pro-Palestine')||stance.includes('critical')?'var(--red)':'var(--blue)'}">${esc(stance)}</div>
            ${crossIdeological&&anyUnexpected?`<span style="font-size:.65rem;color:var(--amber)">⚡ cross-ideological</span>`:''}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px">`;

        figs.forEach(f=>{
          const typeColor=f.type.includes('realist')?'var(--blue)':f.type.includes('nationalist')||f.type.includes('far_right')?'var(--amber)':f.type.includes('progressive')?'var(--green)':'var(--muted)';
          // Show drift if position changed across days
          const allStances=[...new Set(f.all.map(p=>p.stance))];
          const hasDrift=allStances.length>1;

          html+=`<div style="display:flex;gap:10px;align-items:flex-start;padding:8px 10px;
            background:var(--surface2);border-radius:8px;
            ${f.latest.unexpected?'border-left:2px solid var(--amber)':''}">
            <div style="flex-shrink:0">
              <div style="font-size:.82rem;font-weight:600">${esc(f.name)}</div>
              <div style="font-size:.65rem;color:${typeColor};margin-top:1px">${esc(f.type.replace(/_/g,' '))}</div>
            </div>
            <div style="flex:1;font-size:.78rem;color:#a8a6a4;line-height:1.5">${esc(f.latest.framing)}</div>
            <div style="flex-shrink:0;text-align:right">
              ${f.latest.unexpected?`<div style="font-size:.65rem;color:var(--amber)">⚡ breaks classical</div>`:''}
              ${hasDrift?`<div style="font-size:.65rem;color:var(--purple)">↕ shifting</div>`:''}
            </div>
          </div>`;
        });

        html+=`</div></div>`;
      });

      // Classical fault line note if any unexpected
      const latestDay=days[0];
      const conv=latestDay?.discourse?.convergence_points?.find(c=>c.topic.toLowerCase().includes(topic.toLowerCase().split('/')[0]));
      if(conv?.classical_fault_line){
        html+=`<div style="margin-top:6px;padding:8px 12px;background:#ffffff08;border-radius:6px;font-size:.75rem;color:var(--muted)">
          <strong style="color:var(--text)">Classical expectation:</strong> ${esc(conv.classical_fault_line)}
        </div>`;
      }
      if(conv?.why_significant){
        html+=`<div style="margin-top:6px;padding:10px 14px;background:var(--amber)09;border:1px solid var(--amber)22;border-radius:8px;font-size:.8rem;color:#fde68a;line-height:1.6">
          ${esc(conv.why_significant)}
        </div>`;
      }

      html+=`</div>`;
    });

    // Divergence points
    const allDivergence=[];
    days.forEach(d=>(d.discourse?.divergence_points||[]).forEach(dp=>allDivergence.push({date:d.date,data:dp})));
    if(allDivergence.length){
      html+=`<div class="sec" style="margin-top:20px;color:var(--red)">🔀 Fracture Lines — Where the Right Is Splitting</div>`;
      allDivergence.forEach(({date,data:dp})=>{
        html+=`<div class="card" style="border-color:var(--red)33;background:var(--red)07">
          <div style="font-size:.95rem;font-weight:700;margin-bottom:8px">${esc(dp.topic)}</div>
          <div class="card-body" style="margin-bottom:12px">${esc(dp.description)}</div>
          <div style="display:flex;gap:16px;flex-wrap:wrap">
            ${dp.figures_pro?.length?`<div><div style="font-size:.65rem;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Pro</div>
              ${dp.figures_pro.map(f=>`<span class="badge badge-muted" style="margin-right:4px">${esc(f)}</span>`).join('')}</div>`:''}
            ${dp.figures_against?.length?`<div><div style="font-size:.65rem;color:var(--red);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px">Against</div>
              ${dp.figures_against.map(f=>`<span class="badge badge-muted" style="margin-right:4px">${esc(f)}</span>`).join('')}</div>`:''}
          </div>
        </div>`;
      });
    }
  } else {
    html+=`<div class="card" style="color:var(--muted);text-align:center;padding:30px">Position data not yet available — will appear from tomorrow's digest.</div>`;
  }

  // ── Leading signals across the week
  html+=`<div class="sec">Leading Signals This Week</div>`;
  const allSignals=[];
  days.forEach(d=>{
    (d.synthesis?.leading_signals||[]).forEach(s=>{
      allSignals.push({date:d.date,signal:s});
    });
  });
  html+=`<div style="display:flex;flex-direction:column;gap:8px">`;
  allSignals.slice(0,8).forEach(({date,signal})=>{
    html+=`<div style="display:flex;gap:12px;padding:14px;background:var(--green)09;border:1px solid var(--green)22;border-radius:10px;">
      <div style="font-size:.65rem;color:var(--muted);flex-shrink:0;padding-top:2px;width:42px">${date.slice(5)}</div>
      <div style="font-size:.85rem;color:#a8a6a4;line-height:1.6">📡 ${esc(signal)}</div>
    </div>`;
  });
  html+=`</div>`;

  document.getElementById('long-content').innerHTML=html;
}

// ─── TODAY VIEW ───────────────────────────────────────────────────────────────
function renderToday(d){
  const renderers={macro:renderMacro,music:renderMusic,acts:renderActs,
    streets:renderStreets,discourse:renderDiscourse,media:renderMedia,synthesis:renderSynthesis};
  const fn=renderers[currentToday];
  document.getElementById('today-content').innerHTML=fn?fn(d):'<div class="loading">No renderer.</div>';
}

function renderMacro(d){
  const m=d.macro; let html='';
  if(m.google_trends_uk?.length){
    html+=`<div class="sec">Google Trends UK</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px">`;
    m.google_trends_uk.forEach(t=>{html+=`<div class="card" style="padding:14px">
      <div style="font-size:1.3rem;font-weight:800;color:var(--purple)">#${t.rank}</div>
      <div style="font-size:.85rem;font-weight:600;margin-top:4px">${esc(t.term)}</div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:3px">${esc(t.volume_est)}</div>
    </div>`;});
    html+=`</div>`;
  }
  if(m.politics?.length){
    html+=`<div class="sec">Politics</div>`;
    m.politics.forEach(p=>{html+=`<div class="card">
      <div class="card-hl">${esc(p.headline)}</div>
      <div class="intensity-wrap">
        <div class="intensity-bar"><div class="intensity-fill" style="width:${p.intensity*10}%;background:${iColor(p.intensity)}"></div></div>
        <span class="badge badge-muted">${esc(p.sentiment)}</span>
      </div>${tagsHtml(p.tags)}</div>`;});
  }
  if(m.economics?.length){
    html+=`<div class="sec">Economics</div>`;
    m.economics.forEach(e=>{html+=`<div class="card">
      <div class="card-hl">${esc(e.headline)}</div>
      <div class="intensity-wrap">
        <div class="intensity-bar"><div class="intensity-fill" style="width:${e.intensity*10}%;background:${iColor(e.intensity)}"></div></div>
        <span class="badge badge-muted">${esc(e.sentiment)}</span>
      </div>${tagsHtml(e.tags)}</div>`;});
  }
  return html;
}

function renderMusic(d){
  const mu=d.culture?.music; let html='';
  if(mu?.apple_music_uk_top12?.length){
    html+=`<div class="sec">Apple Music UK Top 12</div><div class="card" style="padding:6px 2px">`;
    mu.apple_music_uk_top12.forEach(t=>{
      const chg=t.change>0?`<span style="color:var(--green)">▲${t.change}</span>`:
        t.change<0?`<span style="color:var(--red)">▼${Math.abs(t.change)}</span>`:`<span style="color:var(--muted)">—</span>`;
      const url=t.apple_music_url||`https://music.apple.com/gb/search?term=${encodeURIComponent((t.artist||'')+' '+(t.title||''))}`;
      html+=`<a class="chart-link" href="${esc(url)}" target="_blank" rel="noopener">
        <div class="pos-n ${t.pos<=3?'gold':''}">${t.pos}</div>
        <div class="chg">${chg}</div>
        <div class="track-inf">
          <div class="t-title">${esc(t.title)}${t.uk_artist?'<span class="uk-badge">UK</span>':''}</div>
          <div class="t-artist">${esc(t.artist)}</div>
          <div class="t-mood">${(t.mood_tags||[]).join(' · ')}</div>
        </div>
        <div class="play-icon">▶</div>
      </a>`;
    });
    html+=`</div>`;
  }
  if(mu?.tiktok_sounds?.length){
    html+=`<div class="sec">TikTok Trending Sounds</div>`;
    mu.tiktok_sounds.forEach(s=>{html+=`<div class="card">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="flex-shrink:0;width:48px;height:48px;border-radius:10px;background:var(--pink)22;border:1px solid var(--pink)44;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:800;color:var(--pink)">${s.score}</div>
        <div><div class="t-title">${esc(s.title)}</div>
        <div class="t-artist">${esc(s.artist)}</div>
        ${s.videos?`<div style="font-size:.72rem;color:var(--muted);margin-top:3px">${s.videos.toLocaleString()} videos · ${s.views.toLocaleString()} views</div>`:''}
        ${tagsHtml(s.mood_tags)}</div>
      </div></div>`;});
  }
  return html||'<div class="loading">No music data.</div>';
}

function renderActs(d){
  if(!d.cultural_acts?.length)return'<div class="loading">No cultural acts.</div>';
  return d.cultural_acts.map(a=>{
    const init=a.figure.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const reachCls=a.reach?.includes('viral')?'badge-red':a.reach?.includes('major')?'badge-amber':'badge-muted';
    return `<div class="card">
      <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--purple)22;border:1px solid var(--purple)44;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:var(--purple);flex-shrink:0">${init}</div>
        <div><div style="font-size:.95rem;font-weight:700">${esc(a.figure)} <span class="badge ${reachCls}">${esc(a.reach)}</span></div>
        <div style="font-size:.78rem;color:var(--muted)">${esc(a.context)}</div></div>
      </div>
      <div class="card-body">${esc(a.event_description)}</div>
      ${a.backlash?`<div class="note-red">⚡ ${esc(a.backlash)}</div>`:''}
      ${a.vs_discourse?`<div class="card-body" style="margin-top:10px;font-style:italic;color:#9ca3af">${esc(a.vs_discourse)}</div>`:''}
      ${tagsHtml(a.topics)}
    </div>`;
  }).join('');
}

function renderStreets(d){
  if(!d.streets)return'<div class="loading">No streets data.</div>';
  let html='';
  if(d.streets.summary)html+=`<div class="card" style="border-color:var(--amber)33;background:var(--amber)07;font-size:.9rem;line-height:1.6">${esc(d.streets.summary)}</div>`;
  (d.streets.protests||[]).forEach(p=>{html+=`<div class="card">
    <div style="font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${esc(p.location)}</div>
    <div class="card-hl">${esc(p.cause)}</div>
    <span class="badge badge-amber">${esc(p.scale)}</span>
    <div class="card-body" style="margin-top:8px">${esc(p.explicit_demand)}</div>
    ${p.counter_protest?`<div class="card-body" style="margin-top:6px;color:#9ca3af">Counter: ${esc(p.counter_protest)}</div>`:''}
  </div>`;});
  return html||'<div class="loading">No data.</div>';
}

function renderDiscourse(d){
  if(!d.discourse)return'<div class="loading">No discourse data.</div>';
  let html='';
  if(d.discourse.convergence_points?.length){
    html+=`<div class="sec">Convergence</div>`;
    d.discourse.convergence_points.forEach(c=>{html+=`<div class="card" style="border-color:var(--green)22;background:var(--green)07">
      <div style="font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--green);margin-bottom:8px">Convergent: ${esc(c.topic)}</div>
      <div class="card-body" style="margin-bottom:6px"><strong style="color:var(--text)">Realist:</strong> ${esc(c.realist_argument)}</div>
      <div class="card-body" style="margin-bottom:6px"><strong style="color:var(--text)">Nationalist:</strong> ${esc(c.nationalist_argument)}</div>
      <div class="card-body" style="font-style:italic;color:#9ca3af">${esc(c.why_it_matters)}</div>
    </div>`;});
  }
  if(d.discourse.realist_academics?.length){
    html+=`<div class="sec">Realist Academics</div>`;
    d.discourse.realist_academics.forEach(f=>{html+=`<div class="card">
      <div style="font-size:.95rem;font-weight:700">${esc(f.figure)}</div>
      <div style="font-size:.78rem;color:var(--muted);margin-bottom:8px">${esc(f.platform)}</div>
      ${f.recent_content_title?`<div class="card-body" style="font-style:italic;margin-bottom:6px">"${esc(f.recent_content_title)}"</div>`:''}
      <div class="card-body">${esc(f.on_current_events)}</div>
      ${tagsHtml(f.narrative_tags)}
    </div>`;});
  }
  if(d.discourse.nationalist_media?.length){
    html+=`<div class="sec">Partisan / Nationalist Media</div>`;
    d.discourse.nationalist_media.forEach(f=>{html+=`<div class="card">
      <div style="font-size:.95rem;font-weight:700">${esc(f.figure)} <span style="font-weight:400;font-size:.82rem;color:var(--muted)">— ${esc(f.outlet)}</span></div>
      <div class="card-body" style="margin-top:8px">${esc(f.framing)}</div>
      ${tagsHtml(f.topics)}
    </div>`;});
  }
  return html||'<div class="loading">No discourse data.</div>';
}

function renderMedia(d){
  let html='';
  if(d.media_framing?.length){
    html+=`<div class="sec">Media Framing</div>`;
    d.media_framing.forEach(m=>{html+=`<div class="card">
      <div style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:.7rem;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--muted);margin-bottom:8px">${esc(m.geo)}</div>
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">${esc(m.outlet)}</div>
      <div class="card-hl">${esc(m.lead_story)}</div>
      <div class="card-body">${esc(m.framing)}</div>
      ${m.divergence_note?`<div class="note-blue">ℹ️ ${esc(m.divergence_note)}</div>`:''}
    </div>`;});
  }
  if(d.silence_detector?.length){
    html+=`<div class="sec">Silence Detector</div>`;
    d.silence_detector.forEach(s=>{html+=`<div class="card" style="background:var(--red)09;border-color:var(--red)22">
      <div style="font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--red);margin-bottom:8px">🔇 What culture isn't talking about</div>
      <div class="card-hl">${esc(s.macro_event)}</div>
      <div class="card-body" style="margin-top:6px">${esc(s.observation)}</div>
      ${tagsHtml(s.registers_silent)}
    </div>`;});
  }
  return html||'<div class="loading">No media data.</div>';
}

function renderSynthesis(d){
  if(!d.synthesis)return'<div class="loading">No synthesis.</div>';
  const s=d.synthesis; let html='';
  html+=`<div style="font-size:1.05rem;font-weight:500;line-height:1.6;padding:20px;background:var(--purple)11;border:1px solid var(--purple)33;border-radius:12px;margin-bottom:20px;color:#d8b4fe">${esc(s.daily_theme)}</div>`;
  if(s.mechanism)html+=`<div class="card"><div class="sec" style="margin-bottom:8px">Mechanism</div><div class="card-body">${esc(s.mechanism)}</div></div>`;
  if(s.leading_signals?.length){
    html+=`<div class="sec">Leading Signals</div>`;
    s.leading_signals.forEach(sig=>{html+=`<div style="display:flex;gap:12px;padding:14px;background:var(--green)09;border:1px solid var(--green)22;border-radius:10px;margin-bottom:8px">
      <div>📡</div><div class="card-body">${esc(sig)}</div></div>`;});
  }
  if(s.connections?.length){
    html+=`<div class="sec">Connections</div>`;
    s.connections.forEach(c=>{
      const confCls=c.confidence==='strong'?'badge-green':c.confidence==='moderate'?'badge-amber':'badge-muted';
      html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div style="font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)">Connection</div>
          <span class="badge ${confCls}">${esc(c.confidence)}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div><span style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Event</span><div class="card-body" style="margin-top:2px">${esc(c.macro_event)}</div></div>
          <div><span style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Response</span><div class="card-body" style="margin-top:2px">${esc(c.cultural_response)}</div></div>
          <div><span style="font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">Why it matters</span><div class="card-body" style="margin-top:2px;font-style:italic;color:#9ca3af">${esc(c.observation)}</div></div>
        </div>
        ${tagsHtml(c.tags)}
      </div>`;
    });
  }
  return html;
}
