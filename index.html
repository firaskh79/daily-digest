<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firas's Daily Digest</title>
<style>
  :root { --bg:#ffffff; --bg2:#f6f5f0; --text:#1a1a18; --text2:#5a5956; --text3:#9a9894; --border:#e8e5df; --blue-bg:#E6F1FB; --blue-fg:#0C447C; --purple-bg:#EEEDFE; --purple-fg:#3C3489; }
  @media (prefers-color-scheme:dark) { :root { --bg:#18181a; --bg2:#222225; --text:#ede9e2; --text2:#9a9794; --text3:#5e5c58; --border:#32302c; --blue-bg:#0a1e30; --blue-fg:#7bbef5; --purple-bg:#1e1b3a; --purple-fg:#a99ff5; } }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
  .page { max-width:640px; margin:0 auto; padding:3rem 2rem; }
  .eyebrow { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text3); margin-bottom:.4rem; }
  h1 { font-size:1.8rem; font-weight:800; letter-spacing:-.02em; }
  .sub { color:var(--text2); margin-top:.4rem; font-size:.95rem; }
  .divider { height:1px; background:var(--border); margin:2rem 0; }
  .dashboard-card {
    display:flex; align-items:center; justify-content:space-between;
    padding:1.1rem 1.2rem; background:var(--purple-bg); border-radius:10px;
    text-decoration:none; color:var(--purple-fg); margin-bottom:2rem;
    transition:opacity .15s;
  }
  .dashboard-card:hover { opacity:.85; }
  .dashboard-left { display:flex; align-items:center; gap:.75rem; }
  .dashboard-icon { font-size:1.4rem; line-height:1; }
  .dashboard-label { font-weight:700; font-size:.95rem; }
  .dashboard-sub { font-size:.78rem; opacity:.7; margin-top:.1rem; }
  .dashboard-arrow { font-size:1rem; opacity:.6; }
  .section-label { font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:.75rem; font-weight:600; }
  .digest-list { list-style:none; }
  .digest-list li { margin-bottom:.6rem; }
  .digest-list a {
    display:flex; align-items:center; justify-content:space-between;
    padding:.9rem 1.1rem; background:var(--bg2); border-radius:8px;
    text-decoration:none; color:var(--text); font-weight:600; font-size:.95rem;
    transition:background .15s;
  }
  .digest-list a:hover { background:var(--blue-bg); color:var(--blue-fg); }
  .arrow { color:var(--text3); }
  .empty { color:var(--text3); font-size:.9rem; padding:1rem 0; }
</style>
</head>
<body>
<div class="page">
  <div class="eyebrow">Firas Khnaisser</div>
  <h1>Daily Digest</h1>
  <p class="sub">A personal briefing covering culture, news, music, film, business &amp; science. Published every morning.</p>
  <div class="divider"></div>

  <a class="dashboard-card" href="trends.html">
    <div class="dashboard-left">
      <div class="dashboard-icon">📊</div>
      <div>
        <div class="dashboard-label">Cultural Intelligence</div>
        <div class="dashboard-sub">How world events shape music, film &amp; content — tracked over time</div>
      </div>
    </div>
    <div class="dashboard-arrow">→</div>
  </a>

  <div class="section-label">Past Digests</div>
  <ul class="digest-list" id="list"></ul>
</div>
<script>
  const files = ['daily-digest-2026-05-19.html'];
  const list = document.getElementById('list');
  if (!files.length) {
    list.innerHTML = '<li class="empty">No digests yet — check back tomorrow.</li>';
  } else {
    list.innerHTML = files.map(f => {
      const d = f.replace('daily-digest-','').replace('.html','');
      const [y,m,day] = d.split('-');
      const date = new Date(+y, +m-1, +day);
      const label = date.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      return `<li><a href="${f}"><span>${label}</span><span class="arrow">→</span></a></li>`;
    }).join('');
  }
</script>
</body>
</html>
