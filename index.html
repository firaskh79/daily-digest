<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Cultural Digest</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e8e6e3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container { max-width: 480px; width: 100%; text-align: center; }
  h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle { color: #6b7280; font-size: 0.95rem; margin-bottom: 40px; }
  .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-digest { background: #a78bfa22; color: #a78bfa; border: 1px solid #a78bfa44; }
  .btn-digest:hover { background: #a78bfa33; }
  .btn-data { background: #60a5fa22; color: #60a5fa; border: 1px solid #60a5fa44; }
  .btn-data:hover { background: #60a5fa33; }
</style>
</head>
<body>
<div class="container">
  <h1>Daily Cultural Digest</h1>
  <p class="subtitle">Cultural intelligence — updated every morning</p>
  <div class="links">
    <a class="btn btn-digest" href="daily-digest.html">📰 Today's Digest</a>
    <a class="btn btn-data" href="trends-viewer.html">📊 Trends</a>
  </div>
</div>
</body>
</html>
