<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Cultural Digest</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0f;
    color: #e8e6e3;
    min-height: 100vh;
    padding: 48px 24px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 48px; }
  h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle {
    color: #6b7280;
    font-size: 0.95rem;
  }
  .digest-list { display: flex; flex-direction: column; gap: 16px; }
  .digest-card {
    background: #13131a;
    border: 1px solid #1f1f2e;
    border-radius: 12px;
    padding: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    transition: border-color 0.2s;
  }
  .digest-card:hover { border-color: #a78bfa44; }
  .digest-card.latest { border-color: #a78bfa66; }
  .date-label {
    font-size: 1.1rem;
    font-weight: 600;
    color: #e8e6e3;
  }
  .latest-badge {
    display: inline-block;
    background: #a78bfa22;
    color: #a78bfa;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: 10px;
    vertical-align: middle;
  }
  .links { display: flex; gap: 10px; flex-shrink: 0; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-digest {
    background: #a78bfa22;
    color: #a78bfa;
    border: 1px solid #a78bfa44;
  }
  .btn-digest:hover { background: #a78bfa33; }
  .btn-data {
    background: #60a5fa22;
    color: #60a5fa;
    border: 1px solid #60a5fa44;
  }
  .btn-data:hover { background: #60a5fa33; }
  .empty {
    color: #4b5563;
    text-align: center;
    padding: 48px 0;
    font-size: 0.95rem;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Daily Cultural Digest</h1>
    <p class="subtitle">Cultural intelligence — updated every morning</p>
  </header>
  <div class="digest-list">
    <div class="digest-card latest">
      <div><span class="date-label">2026-05-21</span><span class="latest-badge">Latest</span></div>
      <div class="links">
        <a class="btn btn-digest" href="daily-digest-2026-05-21.html">📰 Digest</a>
        <a class="btn btn-data" href="trends-viewer.html?date=2026-05-21">📊 Trends</a>
      </div>
    </div>
    <div class="digest-card">
      <div><span class="date-label">2026-05-20</span></div>
      <div class="links">
        <a class="btn btn-digest" href="daily-digest-2026-05-20.html">📰 Digest</a>
        <a class="btn btn-data" href="trends-viewer.html?date=2026-05-20">📊 Trends</a>
      </div>
    </div>
    <div class="digest-card">
      <div><span class="date-label">2026-05-19</span></div>
      <div class="links">
        <a class="btn btn-digest" href="daily-digest-2026-05-19.html">📰 Digest</a>
        <a class="btn btn-data" href="trends-viewer.html?date=2026-05-19">📊 Trends</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
