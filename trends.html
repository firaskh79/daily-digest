<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cultural Intelligence · Firas's Digest</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#ffffff; --bg-2:#f6f5f0; --bg-3:#eceae3;
    --text:#1a1a18; --text-2:#5a5956; --text-3:#9a9894;
    --border:#e8e5df;
    --purple-bg:#EEEDFE; --purple-fg:#3C3489;
    --teal-bg:#E1F5EE;   --teal-fg:#0F6E56;
    --coral-bg:#FAECE7;  --coral-fg:#712B13;
    --amber-bg:#FAEEDA;  --amber-fg:#633806;
    --blue-bg:#E6F1FB;   --blue-fg:#0C447C;
    --green-bg:#EAF3DE;  --green-fg:#27500A;
    --gray-bg:#F1EFE8;   --gray-fg:#444441;
  }
  @media (prefers-color-scheme:dark) {
    :root {
      --bg:#18181a; --bg-2:#222225; --bg-3:#2a2a2e;
      --text:#ede9e2; --text-2:#9a9794; --text-3:#5e5c58;
      --border:#32302c;
      --purple-bg:#1e1b3a; --purple-fg:#a99ff5;
      --teal-bg:#0f2820;   --teal-fg:#5dd4a8;
      --coral-bg:#2a1510;  --coral-fg:#f4917a;
      --amber-bg:#271a08;  --amber-fg:#f2c07a;
      --blue-bg:#0a1e30;   --blue-fg:#7bbef5;
      --green-bg:#111f08;  --green-fg:#8ed45a;
      --gray-bg:#202020;   --gray-fg:#c0bdb7;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:15px; line-height:1.6; }

  .page { max-width:900px; margin:0 auto; padding:0 1.5rem 5rem; }

  /* ── HEADER ── */
  .header { padding:2.5rem 0 1.5rem; border-bottom:2px solid var(--text); margin-bottom:2rem; }
  .header-eyebrow { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-3); margin-bottom:.3rem; }
  .header h1 { font-size:1.8rem; font-weight:800; letter-spacing:-.02em; }
  .header-sub { color:var(--text-2); font-size:.9rem; margin-top:.3rem; }
  .back-link { float:right; font-size:.82rem; color:var(--text-3); text-decoration:none; padding-top:.3rem; }
  .back-link:hover { color:var(--text); }

  /* ── MOOD BANNER ── */
  .mood-banner { border-radius:10px; padding:1.1rem 1.3rem; margin-bottom:1.5rem; }
  .mood-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; font-weight:800; margin-bottom:.3rem; }
  .mood-theme { font-size:.95rem; font-weight:600; line-height:1.4; }
  .mood-anxious      { background:var(--amber-bg); color:var(--amber-fg); }
  .mood-celebratory  { background:var(--green-bg);  color:var(--green-fg); }
  .mood-reflective   { background:var(--purple-bg); color:var(--purple-fg); }
  .mood-escapist     { background:var(--blue-bg);   color:var(--blue-fg); }
  .mood-energised    { background:var(--teal-bg);   color:var(--teal-fg); }
  .mood-melancholic  { background:var(--gray-bg);   color:var(--gray-fg); }
  .mood-conflicted   { background:var(--coral-bg);  color:var(--coral-fg); }

  /* ── DAY SELECTOR ── */
  .day-selector { display:flex; gap:.5rem; overflow-x:auto; padding-bottom:.75rem; margin-bottom:2rem; scrollbar-width:none; }
  .day-selector::-webkit-scrollbar { display:none; }
  .day-chip { flex-shrink:0; padding:.5rem .9rem; border-radius:20px; font-size:.82rem; font-weight:700; cursor:pointer; border:2px solid transparent; transition:all .15s; white-space:nowrap; }
  .day-chip.active { border-color:var(--text); }
  .day-chip-anxious     { background:var(--amber-bg); color:var(--amber-fg); }
  .day-chip-celebratory { background:var(--green-bg); color:var(--green-fg); }
  .day-chip-reflective  { background:var(--purple-bg); color:var(--purple-fg); }
  .day-chip-escapist    { background:var(--blue-bg); color:var(--blue-fg); }
  .day-chip-energised   { background:var(--teal-bg); color:var(--teal-fg); }
  .day-chip-melancholic { background:var(--gray-bg); color:var(--gray-fg); }
  .day-chip-conflicted  { background:var(--coral-bg); color:var(--coral-fg); }
  .day-chip-unknown     { background:var(--bg-2); color:var(--text-3); }

  /* ── SECTION HEADER ── */
  .section-header { display:flex; align-items:baseline; gap:.6rem; margin-bottom:1.1rem; padding-bottom:.5rem; border-bottom:1px solid var(--border); }
  .section-num { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-3); }
  .section-title { font-size:1rem; font-weight:700; }

  /* ── DUAL TRACK ── */
  .dual-track { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:2rem; }
  @media (max-width:600px) { .dual-track { grid-template-columns:1fr; } }
  .track { background:var(--bg-2); border-radius:10px; padding:1.1rem; }
  .track-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-3); font-weight:800; margin-bottom:.9rem; }
  .track-item { margin-bottom:.85rem; padding-bottom:.85rem; border-bottom:1px solid var(--border); }
  .track-item:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .track-item-headline { font-size:.88rem; font-weight:700; color:var(--text); margin-bottom:.25rem; line-height:1.3; }
  .track-item-tags { display:flex; flex-wrap:wrap; gap:.3rem; margin-top:.35rem; }
  .tag { display:inline-block; font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:2px 6px; border-radius:3px; }
  .intensity-bar { height:3px; border-radius:2px; background:var(--border); margin-top:.4rem; overflow:hidden; }
  .intensity-fill { height:100%; border-radius:2px; background:var(--text-2); }

  /* ── CONNECTIONS ── */
  .connections-section { margin-bottom:2rem; }
  .connection-card { background:var(--bg-2); border-radius:10px; padding:1.1rem 1.2rem; margin-bottom:.9rem; border-left:3px solid var(--border); }
  .connection-card.strong    { border-left-color:var(--teal-fg); }
  .connection-card.moderate  { border-left-color:var(--amber-fg); }
  .connection-card.speculative { border-left-color:var(--text-3); }
  .connection-header { display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; margin-bottom:.6rem; }
  .connection-pair { font-size:.85rem; font-weight:700; color:var(--text); line-height:1.3; }
  .connection-pair span { color:var(--text-3); font-weight:400; }
  .connection-badge { flex-shrink:0; font-size:10px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; padding:3px 7px; border-radius:3px; }
  .badge-strong     { background:var(--teal-bg); color:var(--teal-fg); }
  .badge-moderate   { background:var(--amber-bg); color:var(--amber-fg); }
  .badge-speculative { background:var(--gray-bg); color:var(--gray-fg); }
  .connection-obs { font-size:.85rem; color:var(--text-2); line-height:1.6; }
  .connection-tags { margin-top:.5rem; display:flex; flex-wrap:wrap; gap:.3rem; }

  /* ── CHARTS ── */
  .charts-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:2rem; }
  @media (max-width:640px) { .charts-grid { grid-template-columns:1fr; } }
  .chart-card { background:var(--bg-2); border-radius:10px; padding:1.1rem; }
  .chart-card h3 { font-size:.88rem; font-weight:700; margin-bottom:1rem; color:var(--text); }
  .chart-card canvas { max-height:220px; }
  .chart-full { grid-column:1/-1; }

  /* ── RECURRING THEMES ── */
  .theme-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:.6rem; margin-bottom:2rem; }
  .theme-tile { background:var(--bg-2); border-radius:8px; padding:.75rem .9rem; }
  .theme-tile .t-name { font-size:.85rem; font-weight:700; margin-bottom:.25rem; }
  .theme-tile .t-count { font-size:.78rem; color:var(--text-3); }
  .theme-tile .t-bar { height:3px; background:var(--border); border-radius:2px; margin-top:.4rem; overflow:hidden; }
  .theme-tile .t-fill { height:100%; border-radius:2px; background:var(--text-2); }

  /* ── SIGNAL TYPE BADGES ── */
  .sig-badge { display:inline-block; font-size:9px; font-weight:800; letter-spacing:.05em; text-transform:uppercase; padding:1px 5px; border-radius:3px; margin-left:.4rem; vertical-align:middle; }
  .sig-leading     { background:#EEEDFE; color:#3C3489; }
  .sig-reactive    { background:#E1F5EE; color:#0F6E56; }
  .sig-lagging     { background:#F1EFE8; color:#444441; }
  .sig-divergence  { background:#FAEEDA; color:#633806; }

  /* ── CROSS-REGISTER MATRIX ── */
  .matrix-wrap { overflow-x:auto; margin-bottom:2rem; }
  .matrix-table { border-collapse:collapse; min-width:100%; font-size:.78rem; }
  .matrix-table th { text-align:left; padding:.35rem .6rem; font-size:10px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-3); border-bottom:2px solid var(--border); white-space:nowrap; }
  .matrix-table th.reg-col { text-align:center; min-width:72px; }
  .matrix-table td { padding:.4rem .6rem; border-bottom:1px solid var(--border); color:var(--text-2); font-size:.8rem; }
  .matrix-table td.reg-cell { text-align:center; }
  .heat-0 { background:transparent; }
  .heat-1 { background:rgba(15,110,86,.12); border-radius:4px; }
  .heat-2 { background:rgba(15,110,86,.28); border-radius:4px; }
  .heat-3 { background:rgba(15,110,86,.50); border-radius:4px; color:#fff; font-weight:700; }

  /* ── SILENCE DETECTOR ── */
  .silence-alert { background:var(--amber-bg); color:var(--amber-fg); border-radius:10px; padding:1rem 1.2rem; margin-bottom:1rem; display:flex; gap:.75rem; align-items:flex-start; }
  .silence-icon { font-size:1.2rem; flex-shrink:0; margin-top:.05rem; }
  .silence-event { font-size:.88rem; font-weight:700; margin-bottom:.2rem; }
  .silence-obs { font-size:.82rem; line-height:1.5; opacity:.85; }
  .silence-registers { margin-top:.4rem; display:flex; flex-wrap:wrap; gap:.3rem; }

  /* ── PODCAST GRID ── */
  .podcast-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:.75rem; margin-bottom:2rem; }
  .podcast-card { background:var(--bg-2); border-radius:10px; padding:.9rem 1rem; border-top:3px solid var(--border); }
  .podcast-card.lean-far-left      { border-top-color:#712B13; }
  .podcast-card.lean-progressive   { border-top-color:#0F6E56; }
  .podcast-card.lean-liberal-left  { border-top-color:#0C447C; }
  .podcast-card.lean-centrist      { border-top-color:#9a9894; }
  .podcast-card.lean-heterodox     { border-top-color:#633806; }
  .podcast-card.lean-center-right  { border-top-color:#444441; }
  .podcast-card.lean-right         { border-top-color:#3C3489; }
  .podcast-card.lean-nationalist   { border-top-color:#712B13; }
  .podcast-card.lean-international { border-top-color:#0F6E56; }
  .podcast-show { font-size:.82rem; font-weight:800; color:var(--text); margin-bottom:.15rem; }
  .podcast-host { font-size:.73rem; color:var(--text-3); margin-bottom:.4rem; }
  .podcast-topic { font-size:.82rem; color:var(--text-2); line-height:1.45; }
  .podcast-lean { font-size:9px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; padding:2px 5px; border-radius:3px; margin-top:.4rem; display:inline-block; }

  /* ── MEDIA FRAMING ── */
  .framing-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:2rem; }
  @media (max-width:600px) { .framing-grid { grid-template-columns:1fr; } }
  .framing-card { background:var(--bg-2); border-radius:10px; padding:.9rem 1rem; }
  .framing-outlet { font-size:.82rem; font-weight:800; color:var(--text); margin-bottom:.1rem; }
  .framing-geo { font-size:.72rem; color:var(--text-3); margin-bottom:.35rem; }
  .framing-lead { font-size:.82rem; color:var(--text-2); line-height:1.45; margin-bottom:.35rem; font-style:italic; }
  .framing-div { font-size:.78rem; color:var(--text-3); line-height:1.4; padding-top:.35rem; border-top:1px solid var(--border); }

  /* ── REGISTER GRID ── */
  .register-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:.75rem; margin-bottom:2rem; }
  .register-tile { background:var(--bg-2); border-radius:10px; padding:.9rem 1rem; border-top:3px solid var(--border); }
  .register-tile.active { border-top-color:var(--teal-fg); }
  .register-tile.hot { border-top-color:var(--coral-fg); }
  .register-tile.warm { border-top-color:var(--amber-fg); }
  .reg-icon { font-size:1.3rem; margin-bottom:.35rem; }
  .reg-name { font-size:.8rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--text); margin-bottom:.2rem; }
  .reg-status { font-size:.76rem; color:var(--text-2); line-height:1.4; }

  /* ── STREETS ── */
  .protest-card { background:var(--bg-2); border-radius:10px; padding:1rem 1.1rem; margin-bottom:.75rem; border-left:3px solid var(--coral-fg); }
  .protest-header { display:flex; justify-content:space-between; align-items:flex-start; gap:.75rem; margin-bottom:.4rem; }
  .protest-location { font-size:.88rem; font-weight:800; color:var(--text); }
  .protest-scale { font-size:10px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:3px; flex-shrink:0; }
  .scale-hundreds { background:var(--coral-bg); color:var(--coral-fg); }
  .scale-tens { background:var(--amber-bg); color:var(--amber-fg); }
  .scale-thousands { background:var(--blue-bg); color:var(--blue-fg); }
  .scale-small { background:var(--gray-bg); color:var(--gray-fg); }
  .protest-cause { font-size:.85rem; color:var(--text-2); line-height:1.5; }
  .protest-demand { font-size:.8rem; color:var(--text-3); margin-top:.35rem; font-style:italic; }

  /* ── FASHION / ART ── */
  .fashion-art-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; margin-bottom:2rem; }
  @media (max-width:600px) { .fashion-art-grid { grid-template-columns:1fr; } }
  .fa-panel { background:var(--bg-2); border-radius:10px; padding:1.1rem; }
  .fa-panel-label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-3); font-weight:800; margin-bottom:.85rem; }
  .fa-item { margin-bottom:.75rem; padding-bottom:.75rem; border-bottom:1px solid var(--border); font-size:.85rem; }
  .fa-item:last-child { margin-bottom:0; padding-bottom:0; border-bottom:none; }
  .fa-item-title { font-weight:700; color:var(--text); margin-bottom:.2rem; font-size:.85rem; }
  .fa-item-body { color:var(--text-2); line-height:1.5; font-size:.82rem; }
  .fa-signal { background:var(--bg-3,#eceae3); border-radius:8px; padding:.7rem .85rem; margin-top:.75rem; font-size:.82rem; color:var(--text-2); line-height:1.5; font-style:italic; }

  /* ── DISCOURSE / VOICES ── */
  .realist-card { background:var(--bg-2); border-radius:10px; padding:1rem 1.1rem; margin-bottom:.75rem; border-left:3px solid var(--purple-fg); }
  .discourse-grid { display:grid; grid-template-columns:1fr 1fr; gap:.9rem; margin-bottom:1rem; }
  @media (max-width:600px) { .discourse-grid { grid-template-columns:1fr; } }
  .voice-card { background:var(--bg-2); border-radius:10px; padding:.9rem 1rem; }
  .voice-card-header { display:flex; justify-content:space-between; align-items:flex-start; gap:.6rem; margin-bottom:.45rem; }
  .voice-name { font-size:.88rem; font-weight:800; color:var(--text); line-height:1.2; }
  .voice-outlet { font-size:.73rem; color:var(--text-3); margin-top:.1rem; }
  .voice-framing { font-size:.83rem; color:var(--text-2); line-height:1.5; }
  .voice-topics { display:flex; flex-wrap:wrap; gap:.3rem; margin-top:.45rem; }
  .vs-badge { flex-shrink:0; font-size:9px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; padding:2px 6px; border-radius:3px; }
  .vs-convergent   { background:var(--teal-bg);   color:var(--teal-fg); }
  .vs-divergent    { background:var(--coral-bg);  color:var(--coral-fg); }
  .vs-independent  { background:var(--gray-bg);   color:var(--gray-fg); }
  .vs-mixed        { background:var(--amber-bg);  color:var(--amber-fg); }
  .convergence-card { background:var(--teal-bg); color:var(--teal-fg); border-radius:10px; padding:1rem 1.1rem; margin-bottom:.75rem; }
  .convergence-card .c-topic { font-size:.88rem; font-weight:800; margin-bottom:.35rem; }
  .convergence-card .c-why { font-size:.83rem; line-height:1.55; opacity:.85; }
  .convergence-card .c-sub { margin-top:.5rem; font-size:.76rem; opacity:.65; line-height:1.5; }

  /* ── EMPTY STATE ── */
  .empty { text-align:center; padding:3rem 1rem; color:var(--text-3); }
  .empty h3 { font-size:1rem; font-weight:700; margin-bottom:.5rem; color:var(--text-2); }
  .empty p { font-size:.88rem; line-height:1.6; }

  /* ── LOADING ── */
  .loading { text-align:center; padding:4rem 1rem; color:var(--text-3); font-size:.9rem; }
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <a class="back-link" href="index.html">← All digests</a>
    <div class="header-eyebrow">Firas Khnaisser</div>
    <h1>Cultural Intelligence</h1>
    <p class="header-sub">How politics, economics and world events shape music, film and content — tracked daily.</p>
  </header>

  <div id="app"><div class="loading">Loading intelligence data…</div></div>

</div>

<script>
const BASE = 'https://firaskh79.github.io/daily-digest/';
const MOOD_COLORS = {
  anxious:     { bg:'#FAEEDA', fg:'#633806' },
  celebratory: { bg:'#EAF3DE', fg:'#27500A' },
  reflective:  { bg:'#EEEDFE', fg:'#3C3489' },
  escapist:    { bg:'#E6F1FB', fg:'#0C447C' },
  energised:   { bg:'#E1F5EE', fg:'#0F6E56' },
  melancholic: { bg:'#F1EFE8', fg:'#444441' },
  conflicted:  { bg:'#FAECE7', fg:'#712B13' },
  unknown:     { bg:'#f6f5f0', fg:'#9a9894'  }
};
const TAG_COLORS = [
  ['#EEEDFE','#3C3489'], ['#E1F5EE','#0F6E56'], ['#FAECE7','#712B13'],
  ['#FAEEDA','#633806'], ['#E6F1FB','#0C447C'], ['#EAF3DE','#27500A']
];
function tagColor(tag) {
  let h = 0; for (const c of tag) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  const [bg,fg] = TAG_COLORS[h % TAG_COLORS.length];
  return `background:${bg};color:${fg}`;
}

let allData = [];
let selectedIdx = 0;
let charts = {};

async function init() {
  try {
    // Load index file
    const idxRes = await fetch(BASE + 'data/index.json?v=' + Date.now());
    if (!idxRes.ok) throw new Error('No data yet');
    const idx = await idxRes.json();
    const files = (idx.files || []).sort().reverse(); // newest first
    if (!files.length) throw new Error('No data yet');

    // Load all data files
    const results = await Promise.all(files.map(f =>
      fetch(BASE + 'data/' + f + '?v=' + Date.now())
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    ));
    allData = results.filter(Boolean).sort((a,b) => b.date.localeCompare(a.date));
    if (!allData.length) throw new Error('No data yet');

    render();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div class="empty">
        <h3>No data yet</h3>
        <p>The first JSON file will appear tomorrow morning after the 5am digest run.<br>
        Come back then — this dashboard gets more interesting every day.</p>
      </div>`;
  }
}

function render() {
  const app = document.getElementById('app');
  const d = allData[selectedIdx];
  const mood = d.mood_of_day || 'unknown';
  const mc = MOOD_COLORS[mood] || MOOD_COLORS.unknown;

  let html = '';

  // ── Mood banner
  html += `
    <div class="mood-banner mood-${mood}">
      <div class="mood-label">${formatDate(d.date)} · Mood of the day: ${mood}</div>
      <div class="mood-theme">${d.synthesis?.daily_theme || 'No theme recorded.'}</div>
    </div>`;

  // ── Day selector
  html += `<div class="day-selector">`;
  allData.forEach((day, i) => {
    const m = day.mood_of_day || 'unknown';
    const label = shortDate(day.date);
    html += `<div class="day-chip day-chip-${m} ${i===selectedIdx?'active':''}" onclick="selectDay(${i})">${label}</div>`;
  });
  html += `</div>`;

  // ── Dual track
  html += `<div class="section-header"><span class="section-num">World vs Culture</span><span class="section-title">Today's Two Tracks</span></div>`;
  html += `<div class="dual-track">`;

  // World track
  html += `<div class="track"><div class="track-label">🌍 World — Politics &amp; Economics</div>`;
  const politics = d.macro?.politics || [];
  const economics = d.macro?.economics || [];
  const macroItems = [...politics, ...economics];
  if (macroItems.length) {
    macroItems.forEach(item => {
      const intensity = item.intensity || 5;
      html += `<div class="track-item">
        <div class="track-item-headline">${item.headline}</div>
        <div class="intensity-bar"><div class="intensity-fill" style="width:${intensity*10}%"></div></div>
        <div class="track-item-tags">${(item.tags||[]).map(t=>`<span class="tag" style="${tagColor(t)}">${t}</span>`).join('')}</div>
      </div>`;
    });
  } else {
    html += `<div style="color:var(--text-3);font-size:.85rem">No macro data recorded.</div>`;
  }
  html += `</div>`;

  // Culture track
  html += `<div class="track"><div class="track-label">🎵 Culture — Music, Film &amp; Content</div>`;
  const tracks12 = d.culture?.music?.apple_music_uk_top12 || [];
  const tiktoks = d.culture?.music?.tiktok_sounds || [];
  const formats = d.culture?.tiktok_formats || [];
  const cultureItems = [
    ...tracks12.slice(0,3).map(t => ({ headline: `#${t.pos} ${t.artist} — ${t.title}`, tags: [...(t.mood_tags||[]), ...(t.theme_tags||[])], intensity: 10 - (t.pos-1) })),
    ...tiktoks.slice(0,2).map(t => ({ headline: `TikTok: "${t.title}" · score ${t.score}`, tags: [...(t.mood_tags||[]), ...(t.theme_tags||[])], intensity: Math.round(t.score/100) }))
  ];
  if (cultureItems.length) {
    cultureItems.forEach(item => {
      const intensity = Math.min(item.intensity||5, 10);
      html += `<div class="track-item">
        <div class="track-item-headline">${item.headline}</div>
        <div class="intensity-bar"><div class="intensity-fill" style="width:${intensity*10}%"></div></div>
        <div class="track-item-tags">${(item.tags||[]).map(t=>`<span class="tag" style="${tagColor(t)}">${t}</span>`).join('')}</div>
      </div>`;
    });
  } else {
    html += `<div style="color:var(--text-3);font-size:.85rem">No culture data recorded.</div>`;
  }
  html += `</div></div>`;

  // ── Cross-register matrix
  html += renderMatrix(d);

  // ── Silence detector
  html += renderSilence(d);

  // ── Cultural Register overview
  html += renderRegisterOverview(d);

  // ── Cultural Acts
  html += renderCulturalActs(d);

  // ── Streets
  html += renderStreets(d);

  // ── Fashion & Art
  html += renderFashionArt(d);

  // ── Podcasts
  html += renderPodcasts(d);

  // ── International media framing
  html += renderMediaFraming(d);

  // ── Discourse / Voices
  html += renderDiscourse(d);

  // ── Connections
  const connections = d.synthesis?.connections || [];
  const leadingSignals = d.synthesis?.leading_signals || [];
  if (connections.length) {
    html += `<div class="section-header"><span class="section-num">Synthesis</span><span class="section-title">World → Culture Connections</span></div>`;
    if (d.synthesis?.mechanism) {
      html += `<div style="background:var(--bg-2);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1rem;font-size:.88rem;color:var(--text-2);line-height:1.6;border-left:3px solid var(--purple-fg)"><strong style="color:var(--text)">Today's mechanism:</strong> ${d.synthesis.mechanism}</div>`;
    }
    if (leadingSignals.length) {
      html += `<div style="background:var(--purple-bg);color:var(--purple-fg);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1rem">
        <div style="font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin-bottom:.4rem">🔮 Leading Signals — Where Culture Is Heading</div>
        ${leadingSignals.map(s=>`<div style="font-size:.83rem;line-height:1.5;margin-bottom:.25rem">· ${s}</div>`).join('')}
      </div>`;
    }
    html += `<div class="connections-section">`;
    const sigLabel = { leading:'🔮 Leading', reactive:'⚡ Reactive', lagging:'📊 Lagging', divergence:'↕ Divergence' };
    connections.forEach(c => {
      const conf = c.confidence || 'speculative';
      const sig = c.signal_type;
      html += `<div class="connection-card ${conf}">
        <div class="connection-header">
          <div class="connection-pair">
            ${c.macro_event} <span>→</span> ${c.cultural_response}
          </div>
          <div style="display:flex;gap:.4rem;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
            ${sig ? `<span class="sig-badge sig-${sig}">${sigLabel[sig]||sig}</span>` : ''}
            <span class="connection-badge badge-${conf}">${conf}</span>
          </div>
        </div>
        ${c.mechanism ? `<div style="font-size:.8rem;color:var(--text-3);margin-bottom:.4rem;font-style:italic;border-left:2px solid var(--border);padding-left:.5rem">Mechanism: ${c.mechanism}</div>` : ''}
        <div class="connection-obs">${c.observation}</div>
        <div class="connection-tags">${(c.tags||[]).map(t=>`<span class="tag" style="${tagColor(t)}">${t}</span>`).join('')}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── Charts (only when we have multiple days)
  if (allData.length >= 2) {
    html += `<div class="section-header"><span class="section-num">Over Time</span><span class="section-title">Trends &amp; Patterns</span></div>`;
    html += `<div class="charts-grid">
      <div class="chart-card chart-full"><h3>Apple Music UK — Artist Position Tracker</h3><canvas id="artistChart"></canvas></div>
      <div class="chart-card"><h3>TikTok Sound Momentum (score)</h3><canvas id="tiktokChart"></canvas></div>
      <div class="chart-card"><h3>Macro Intensity by Day</h3><canvas id="macroChart"></canvas></div>
    </div>`;

    // Recurring themes across all days
    const themeCounts = {};
    allData.forEach(day => {
      const allTags = [
        ...(day.macro?.politics||[]).flatMap(p=>p.tags||[]),
        ...(day.macro?.economics||[]).flatMap(p=>p.tags||[]),
        ...(day.culture?.music?.tiktok_sounds||[]).flatMap(t=>[...(t.mood_tags||[]),...(t.theme_tags||[])]),
        ...(day.synthesis?.connections||[]).flatMap(c=>c.tags||[])
      ];
      allTags.forEach(t => { themeCounts[t] = (themeCounts[t]||0) + 1; });
    });
    const topThemes = Object.entries(themeCounts).sort((a,b)=>b[1]-a[1]).slice(0,12);
    const maxCount = topThemes[0]?.[1] || 1;
    if (topThemes.length) {
      html += `<div class="section-header"><span class="section-num">Recurring</span><span class="section-title">Most Persistent Themes</span></div>`;
      html += `<div class="theme-grid">`;
      topThemes.forEach(([tag, count]) => {
        html += `<div class="theme-tile">
          <div class="t-name">${tag}</div>
          <div class="t-count">${count} day${count>1?'s':''}</div>
          <div class="t-bar"><div class="t-fill" style="width:${Math.round(count/maxCount*100)}%"></div></div>
        </div>`;
      });
      html += `</div>`;
    }
  } else {
    html += `<div class="empty" style="padding:1.5rem 0 2.5rem">
      <h3>Charts appear after 2+ days</h3>
      <p>Come back tomorrow — trends, patterns and charts will appear as data accumulates.</p>
    </div>`;
  }

  app.innerHTML = html;

  // Render charts
  if (allData.length >= 2) {
    renderCharts();
  }
}

function renderCharts() {
  const dates = allData.map(d => shortDate(d.date)).reverse();

  // ── Artist position chart
  // Collect all artists appearing in any day's top 12
  const artistSets = {};
  allData.forEach(day => {
    (day.culture?.music?.apple_music_uk_top12 || []).forEach(t => {
      if (!artistSets[t.artist]) artistSets[t.artist] = {};
      artistSets[t.artist][day.date] = t.pos;
    });
  });
  // Pick top 5 artists by most frequent appearances
  const topArtists = Object.entries(artistSets)
    .sort((a,b) => Object.keys(b[1]).length - Object.keys(a[1]).length)
    .slice(0, 5);

  const CHART_COLORS = ['#3C3489','#0F6E56','#712B13','#633806','#0C447C'];
  const sortedDates = allData.map(d=>d.date).sort();

  if (document.getElementById('artistChart')) {
    if (charts.artist) charts.artist.destroy();
    charts.artist = new Chart(document.getElementById('artistChart'), {
      type: 'line',
      data: {
        labels: sortedDates.map(shortDate),
        datasets: topArtists.map(([artist, byDate], i) => ({
          label: artist,
          data: sortedDates.map(d => byDate[d] || null),
          borderColor: CHART_COLORS[i],
          backgroundColor: CHART_COLORS[i] + '22',
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
        }))
      },
      options: {
        responsive: true,
        scales: {
          y: { reverse: true, min: 1, max: 20, title: { display: true, text: 'Chart position' }, ticks: { color: '#9a9894' }, grid: { color: '#e8e5df' } },
          x: { ticks: { color: '#9a9894' }, grid: { color: '#e8e5df' } }
        },
        plugins: { legend: { labels: { color: '#5a5956', font: { size: 11 } } } }
      }
    });
  }

  // ── TikTok momentum chart
  const soundSets = {};
  allData.forEach(day => {
    (day.culture?.music?.tiktok_sounds || []).forEach(s => {
      if (!soundSets[s.title]) soundSets[s.title] = {};
      soundSets[s.title][day.date] = s.score;
    });
  });
  const topSounds = Object.entries(soundSets)
    .sort((a,b) => Math.max(...Object.values(b[1])) - Math.max(...Object.values(a[1])))
    .slice(0, 4);

  if (document.getElementById('tiktokChart')) {
    if (charts.tiktok) charts.tiktok.destroy();
    charts.tiktok = new Chart(document.getElementById('tiktokChart'), {
      type: 'line',
      data: {
        labels: sortedDates.map(shortDate),
        datasets: topSounds.map(([sound, byDate], i) => ({
          label: sound.length > 22 ? sound.slice(0,22)+'…' : sound,
          data: sortedDates.map(d => byDate[d] || null),
          borderColor: CHART_COLORS[i],
          tension: 0.3,
          spanGaps: true,
          pointRadius: 4,
        }))
      },
      options: {
        responsive: true,
        scales: {
          y: { title: { display: true, text: 'Score' }, ticks: { color: '#9a9894' }, grid: { color: '#e8e5df' } },
          x: { ticks: { color: '#9a9894' }, grid: { color: '#e8e5df' } }
        },
        plugins: { legend: { labels: { color: '#5a5956', font: { size: 11 } } } }
      }
    });
  }

  // ── Macro intensity chart
  if (document.getElementById('macroChart')) {
    if (charts.macro) charts.macro.destroy();
    const macroByDay = sortedDates.map(date => {
      const day = allData.find(d=>d.date===date);
      if (!day) return 0;
      const items = [...(day.macro?.politics||[]), ...(day.macro?.economics||[])];
      return items.length ? items.reduce((s,i)=>s+(i.intensity||5),0)/items.length : 0;
    });
    charts.macro = new Chart(document.getElementById('macroChart'), {
      type: 'bar',
      data: {
        labels: sortedDates.map(shortDate),
        datasets: [{
          label: 'Avg macro intensity',
          data: macroByDay,
          backgroundColor: sortedDates.map((date,i) => {
            const day = allData.find(d=>d.date===date);
            return MOOD_COLORS[day?.mood_of_day||'unknown']?.bg || '#f6f5f0';
          }),
          borderColor: sortedDates.map((date,i) => {
            const day = allData.find(d=>d.date===date);
            return MOOD_COLORS[day?.mood_of_day||'unknown']?.fg || '#9a9894';
          }),
          borderWidth: 2,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: { min:0, max:10, title:{ display:true, text:'Intensity (0–10)' }, ticks:{color:'#9a9894'}, grid:{color:'#e8e5df'} },
          x: { ticks:{color:'#9a9894'}, grid:{color:'#e8e5df'} }
        },
        plugins: { legend: { display: false } }
      }
    });
  }
}

// ── Cross-register matrix ────────────────────────────────────
function renderMatrix(d) {
  // Collect all tags per register
  const registers = [
    { key:'streets',  label:'Streets',       icon:'✊', tags: (d.streets?.protests||[]).flatMap(p=>[p.cause,...(p.related_events||[])]) },
    { key:'acts',     label:'Cultural Acts', icon:'🎤', tags: (d.cultural_acts||[]).flatMap(a=>[...(a.topics||[]),a.political_valence].filter(Boolean)) },
    { key:'fashion',  label:'Fashion',       icon:'👗', tags: [...(d.fashion?.designer_statements||[]).flatMap(ds=>[ds.political_valence]).filter(Boolean), ...(d.fashion?.met_gala?.statements_made||[]).length ? ['spectacle'] : []] },
    { key:'art',      label:'Art',           icon:'🎨', tags: (d.art_scene?.current_fairs||[]).flatMap(f=>(f.political_signals||[]).map(s=>s.split(' ').slice(0,2).join('-').toLowerCase())) },
    { key:'music',    label:'Music',         icon:'🎵', tags: [...(d.culture?.music?.apple_music_uk_top12||[]).flatMap(t=>[...(t.mood_tags||[]),...(t.theme_tags||[])]), ...(d.culture?.music?.tiktok_sounds||[]).flatMap(t=>[...(t.mood_tags||[]),...(t.theme_tags||[])])] },
    { key:'podcasts', label:'Podcasts',      icon:'🎙', tags: (d.podcasts||[]).flatMap(p=>(p.topic||'').toLowerCase().split(/[\s,]+/).slice(0,3)) },
    { key:'macro',    label:'World',         icon:'🌍', tags: [...(d.macro?.politics||[]).flatMap(p=>p.tags||[]),...(d.macro?.economics||[]).flatMap(e=>e.tags||[])] },
  ];

  // Build theme frequency map across all registers
  const allTags = {};
  registers.forEach(r => r.tags.forEach(t => { if(t && t.length > 2) allTags[t] = (allTags[t]||0)+1; }));
  const topThemes = Object.entries(allTags).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([t])=>t);
  if (!topThemes.length) return '';

  // Count per register × theme
  function countHeat(regTags, theme) {
    return regTags.filter(t => t && t.includes(theme.slice(0,6))).length;
  }

  let html = `<div class="section-header"><span class="section-num">Matrix</span><span class="section-title">Theme × Register</span></div>`;
  html += `<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Register</th>`;
  topThemes.forEach(t => html += `<th class="reg-col">${t}</th>`);
  html += `</tr></thead><tbody>`;
  registers.forEach(r => {
    html += `<tr><td>${r.icon} ${r.label}</td>`;
    topThemes.forEach(theme => {
      const h = Math.min(countHeat(r.tags, theme), 3);
      html += `<td class="reg-cell heat-${h}">${h > 0 ? h : ''}</td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

// ── Silence detector ─────────────────────────────────────────
function renderSilence(d) {
  const silences = d.silence_detector || [];
  if (!silences.length) return '';
  let html = '';
  silences.forEach(s => {
    html += `<div class="silence-alert">
      <div class="silence-icon">🔇</div>
      <div>
        <div class="silence-event">${s.macro_event}</div>
        <div class="silence-obs">${s.observation}</div>
        <div class="silence-registers">${(s.registers_silent||[]).map(r=>`<span class="tag" style="background:rgba(0,0,0,.08);color:var(--amber-fg)">${r} silent</span>`).join('')}</div>
      </div>
    </div>`;
  });
  return html;
}

// ── Podcasts ─────────────────────────────────────────────────
const LEAN_LABEL = {
  'far-left':'Far Left','progressive':'Progressive','liberal-left':'Liberal Left',
  'centrist':'Centrist','heterodox':'Heterodox','center-right':'Centre Right',
  'right':'Right','nationalist':'Nationalist','academic':'Academic','international':'International'
};
const LEAN_STYLE = {
  'far-left':'background:#FAECE7;color:#712B13','progressive':'background:#E1F5EE;color:#0F6E56',
  'liberal-left':'background:#E6F1FB;color:#0C447C','centrist':'background:#F1EFE8;color:#444441',
  'heterodox':'background:#FAEEDA;color:#633806','center-right':'background:#F1EFE8;color:#444441',
  'right':'background:#EEEDFE;color:#3C3489','nationalist':'background:#FAECE7;color:#712B13',
  'academic':'background:#EAF3DE;color:#27500A','international':'background:#E1F5EE;color:#0F6E56'
};

function renderPodcasts(d) {
  const pods = (d.podcasts||[]).filter(p => p.topic || p.framing);
  if (!pods.length) return '';
  const sigLabel = { leading:'🔮 Leading', reactive:'⚡ Reactive', lagging:'📊 Lagging' };

  let html = `<div class="section-header"><span class="section-num">Podcasts</span><span class="section-title">Long-form Narrative Tracker</span></div>`;
  html += `<div class="podcast-grid">`;
  pods.forEach(p => {
    const lean = p.political_lean || 'centrist';
    const leanStyle = LEAN_STYLE[lean] || LEAN_STYLE.centrist;
    const sig = p.signal_type;
    html += `<div class="podcast-card lean-${lean}">
      <div class="podcast-show">${p.show}${sig ? `<span class="sig-badge sig-${sig}">${sigLabel[sig]||sig}</span>` : ''}</div>
      <div class="podcast-host">${p.host || ''} · ${p.geo || ''}</div>
      <div class="podcast-topic">${p.framing || p.topic || ''}</div>
      ${p.recent_episode_title ? `<div style="font-size:.72rem;color:var(--text-3);margin-top:.3rem;font-style:italic">"${p.recent_episode_title}"</div>` : ''}
      <span class="podcast-lean" style="${leanStyle}">${LEAN_LABEL[lean]||lean}</span>
      ${p.vs_mainstream ? `<span class="tag" style="margin-left:.3rem;${p.vs_mainstream==='challenging'?'background:#E1F5EE;color:#0F6E56':p.vs_mainstream==='amplifying'?'background:#FAEEDA;color:#633806':'background:#F1EFE8;color:#444441'}">${p.vs_mainstream}</span>` : ''}
    </div>`;
  });
  html += `</div>`;
  return html;
}

// ── International media framing ──────────────────────────────
function renderMediaFraming(d) {
  const frames = (d.media_framing||[]).filter(f => f.lead_story || f.framing);
  if (!frames.length) return '';
  let html = `<div class="section-header"><span class="section-num">Media Framing</span><span class="section-title">Same Event, Different Worlds</span></div>`;
  html += `<div class="framing-grid">`;
  frames.forEach(f => {
    html += `<div class="framing-card">
      <div class="framing-outlet">${f.outlet}</div>
      <div class="framing-geo">${f.geo} · ${f.political_lean||''}</div>
      ${f.lead_story ? `<div class="framing-lead">"${f.lead_story}"</div>` : ''}
      ${f.framing ? `<div style="font-size:.82rem;color:var(--text-2);line-height:1.5;margin-bottom:.35rem">${f.framing}</div>` : ''}
      ${f.diverges_from_anglophone && f.divergence_note ? `<div class="framing-div">↕ ${f.divergence_note}</div>` : ''}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function registerHeat(d) {
  // Returns heat level for each register based on data presence
  const acts = d.cultural_acts || [];
  const protests = d.streets?.protests || [];
  const fashionActs = (d.fashion?.designer_statements || []).length + (d.fashion?.met_gala?.statements_made?.length || 0);
  const artFairs = (d.art_scene?.current_fairs || []).filter(f=>f.running).length;
  return {
    streets:  protests.length > 2 ? 'hot' : protests.length > 0 ? 'warm' : '',
    artists:  acts.length > 2 ? 'hot' : acts.length > 0 ? 'warm' : '',
    fashion:  fashionActs > 1 ? 'active' : fashionActs > 0 ? 'warm' : '',
    art:      artFairs > 0 ? 'active' : '',
    spectacle: d.fashion?.met_gala?.theme ? 'warm' : '',
  };
}

function renderRegisterOverview(d) {
  const heat = registerHeat(d);
  const protests = d.streets?.protests || [];
  const acts = d.cultural_acts || [];
  const fairs = (d.art_scene?.current_fairs || []).filter(f=>f.running);
  const top5 = d.culture?.music?.apple_music_uk_top5 || d.culture?.music?.apple_music_uk_top12 || [];

  const registers = [
    { key:'streets', icon:'✊', name:'Streets', heat: heat.streets,
      status: protests.length ? `${protests.length} protest${protests.length>1?'s':''} tracked` : '' },
    { key:'artists', icon:'🎤', name:'Cultural Acts', heat: heat.artists,
      status: acts.length ? `${acts.length} intervention${acts.length>1?'s':''} recorded` : '' },
    { key:'fashion', icon:'👗', name:'Fashion', heat: heat.fashion,
      status: d.fashion?.trend_signal ? d.fashion.trend_signal.slice(0,60)+'…' : '' },
    { key:'art', icon:'🎨', name:'Art Scene', heat: heat.art,
      status: fairs.length ? fairs.map(f=>f.fair).join(' · ') : '' },
    { key:'music', icon:'🎵', name:'Music', heat: top5.length ? 'active' : '',
      status: top5[0] ? `#1 ${top5[0].artist}` : '' },
    { key:'spectacle', icon:'💎', name:'Spectacle', heat: heat.spectacle,
      status: d.fashion?.met_gala?.theme ? `Met Gala: ${d.fashion.met_gala.theme}` : '' },
  ];

  // Only show tiles that have actual data
  const activeTiles = registers.filter(r => r.heat && r.status);
  if (!activeTiles.length) return '';

  let html = `<div class="section-header"><span class="section-num">Registers</span><span class="section-title">Cultural Activity Today</span></div>`;
  html += `<div class="register-grid">`;
  activeTiles.forEach(r => {
    html += `<div class="register-tile ${r.heat}">
      <div class="reg-icon">${r.icon}</div>
      <div class="reg-name">${r.name}</div>
      <div class="reg-status">${r.status}</div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderStreets(d) {
  const protests = d.streets?.protests || [];
  const summary = d.streets?.summary;
  if (!protests.length && !summary) return '';

  const scaleClass = { 'hundreds-of-thousands':'scale-hundreds', 'tens-of-thousands':'scale-tens', 'thousands':'scale-thousands', 'small':'scale-small' };
  const scaleLabel = { 'hundreds-of-thousands':'100k+', 'tens-of-thousands':'10k+', 'thousands':'1k+', 'small':'Small' };

  let html = `<div class="section-header"><span class="section-num">Streets</span><span class="section-title">Protests &amp; Rallies</span></div>`;
  if (summary) html += `<p style="font-size:.88rem;color:var(--text-2);margin-bottom:1rem;line-height:1.6">${summary}</p>`;

  protests.forEach(p => {
    const sc = p.scale || 'small';
    const cross = p.cross_border ? `<span class="tag" style="background:var(--purple-bg);color:var(--purple-fg)">Cross-border</span>` : '';
    html += `<div class="protest-card">
      <div class="protest-header">
        <div class="protest-location">📍 ${p.location}</div>
        <span class="protest-scale ${scaleClass[sc]||'scale-small'}">${scaleLabel[sc]||sc}</span>
      </div>
      <div class="protest-cause">${p.cause}</div>
      ${p.explicit_demand ? `<div class="protest-demand">Demand: ${p.explicit_demand}</div>` : ''}
      ${p.counter_protest ? `<div style="font-size:.79rem;color:var(--text-3);margin-top:.3rem;border-top:1px solid var(--border);padding-top:.3rem">Counter: ${p.counter_protest}</div>` : ''}
      <div style="margin-top:.45rem;display:flex;flex-wrap:wrap;gap:.3rem">
        ${cross}
        ${(p.related_events||[]).map(e=>`<span class="tag" style="${tagColor(e)}">${e}</span>`).join('')}
      </div>
    </div>`;
  });

  return html;
}

function renderFashionArt(d) {
  const fashion = d.fashion;
  const art = d.art_scene;

  const metGala = fashion?.met_gala;
  const hasFashion = metGala?.theme || (fashion?.designer_statements||[]).length || fashion?.trend_signal;
  const hasArt = (art?.current_fairs||[]).length || (art?.notable_works_or_shows||[]).length || art?.auction_signals;

  if (!hasFashion && !hasArt) return '';

  let html = `<div class="section-header"><span class="section-num">Fashion &amp; Art</span><span class="section-title">Industry Signals</span></div>`;
  html += `<div class="fashion-art-grid">`;

  // Fashion panel — only render if there's content
  if (hasFashion) {
    html += `<div class="fa-panel"><div class="fa-panel-label">👗 Fashion</div>`;
    if (metGala?.theme) {
      html += `<div class="fa-item">
        <div class="fa-item-title">Met Gala ${metGala.year} — ${metGala.theme}</div>
        ${(metGala.statements_made||[]).map(s=>`<div class="fa-item-body">${s}</div>`).join('')}
        ${metGala.overall_reading ? `<div class="fa-signal">${metGala.overall_reading}</div>` : ''}
      </div>`;
    }
    (fashion?.designer_statements||[]).forEach(ds => {
      html += `<div class="fa-item">
        <div class="fa-item-title">${ds.designer_or_brand}</div>
        <div class="fa-item-body">${ds.statement_or_collection}</div>
        ${ds.political_valence ? `<span class="tag" style="${valenceStyle(ds.political_valence)}">${ds.political_valence}</span>` : ''}
      </div>`;
    });
    if (fashion?.trend_signal) {
      html += `<div class="fa-signal">${fashion.trend_signal}</div>`;
    }
    html += `</div>`;
  }

  // Art panel — only render if there's content
  if (hasArt) {
    html += `<div class="fa-panel"><div class="fa-panel-label">🎨 Art Scene</div>`;
    (art?.current_fairs||[]).forEach(fair => {
      html += `<div class="fa-item">
        <div class="fa-item-title">${fair.fair}${fair.location ? ` · ${fair.location}` : ''}</div>
        ${fair.curatorial_theme ? `<div class="fa-item-body" style="font-style:italic;margin-bottom:.3rem">"${fair.curatorial_theme}"</div>` : ''}
        ${(fair.political_signals||[]).map(s=>`<div class="fa-item-body">· ${s}</div>`).join('')}
        ${fair.market_signal ? `<div class="fa-signal">${fair.market_signal}</div>` : ''}
      </div>`;
    });
    (art?.notable_works_or_shows||[]).forEach(w => {
      html += `<div class="fa-item">
        <div class="fa-item-title">${w.artist}${w.work_or_show ? ` — ${w.work_or_show}` : ''}</div>
        ${w.venue ? `<div style="font-size:.76rem;color:var(--text-3);margin-bottom:.2rem">${w.venue}</div>` : ''}
        <div class="fa-item-body">${w.political_reading}</div>
      </div>`;
    });
    if (art?.auction_signals) {
      html += `<div class="fa-signal">${art.auction_signals}</div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

const VALENCE_STYLE = {
  'anti-authoritarian': ['#E1F5EE','#0F6E56'],
  'nationalist':        ['#FAECE7','#712B13'],
  'anti-war':           ['#E6F1FB','#0C447C'],
  'pro-Palestine':      ['#EEEDFE','#3C3489'],
  'pro-Israel':         ['#FAEEDA','#633806'],
  'anti-immigration':   ['#FAECE7','#712B13'],
  'pro-immigration':    ['#E1F5EE','#0F6E56'],
  'feminist':           ['#EEEDFE','#3C3489'],
  'climate':            ['#EAF3DE','#27500A'],
  'anti-establishment': ['#F1EFE8','#444441'],
};
function valenceStyle(v) {
  const [bg,fg] = VALENCE_STYLE[v] || ['#F1EFE8','#444441'];
  return `background:${bg};color:${fg}`;
}

function renderCulturalActs(d) {
  const acts = d.cultural_acts || [];
  if (!acts.length) return '';

  let html = `<div class="section-header"><span class="section-num">Cultural Acts</span><span class="section-title">Political Interventions by Cultural Figures</span></div>`;

  acts.forEach(act => {
    const valence = act.political_valence || 'anti-establishment';
    html += `<div class="connection-card" style="border-left-color:${(VALENCE_STYLE[valence]||['#e8e5df'])[1]}">
      <div class="connection-header">
        <div>
          <div style="font-size:.82rem;font-weight:800;color:var(--text)">${act.figure}</div>
          <div style="font-size:.76rem;color:var(--text-3);margin-top:.1rem">${act.context}</div>
        </div>
        <span class="connection-badge" style="${valenceStyle(valence)}">${valence.replace(/-/g,' ')}</span>
      </div>
      <div class="connection-obs" style="margin-bottom:.5rem">${act.event_description}</div>
      ${act.backlash ? `<div style="font-size:.8rem;color:var(--text-3);border-top:1px solid var(--border);padding-top:.4rem;margin-bottom:.4rem"><strong>Response:</strong> ${act.backlash}</div>` : ''}
      ${act.vs_discourse ? `<div style="font-size:.8rem;color:var(--text-3);font-style:italic">${act.vs_discourse}</div>` : ''}
      <div class="connection-tags" style="margin-top:.5rem">
        ${(act.explicit_targets||[]).map(t=>`<span class="tag" style="background:var(--coral-bg);color:var(--coral-fg)">${t}</span>`).join('')}
        ${(act.topics||[]).map(t=>`<span class="tag" style="${tagColor(t)}">${t}</span>`).join('')}
      </div>
    </div>`;
  });

  return html;
}

function renderDiscourse(d) {
  const disc = d.discourse;
  if (!disc) return '';

  let html = `<div class="section-header"><span class="section-num">Voices</span><span class="section-title">Realist Critique &amp; Nationalist Amplifiers</span></div>`;

  // Academic realists
  const realists = (disc.realist_academics || []);
  realists.forEach(r => {
    if (!r.on_current_events && !r.recent_content_title) return;
    html += `<div class="realist-card">
      <div class="voice-card-header">
        <div>
          <div class="voice-name">${r.figure}</div>
          <div class="voice-outlet">${r.platform || 'Podcast / Substack'} · Academic Realist</div>
        </div>
        <span class="tag" style="background:var(--purple-bg);color:var(--purple-fg)">Realist</span>
      </div>
      ${r.recent_content_title ? `<div style="font-size:.79rem;color:var(--text-3);margin-bottom:.3rem;font-style:italic">"${r.recent_content_title}"</div>` : ''}
      ${r.on_current_events ? `<div class="voice-framing">${r.on_current_events}</div>` : ''}
      <div class="voice-topics">${(r.narrative_tags||[]).map(t=>`<span class="tag" style="${tagColor(t)}">${t}</span>`).join('')}</div>
    </div>`;
  });

  // Nationalist media grid
  const nationalists = (disc.nationalist_media || []);
  if (nationalists.length) {
    html += `<div class="discourse-grid">`;
    nationalists.forEach(v => {
      const vs = v.vs_realists || 'independent';
      const vsLabel = { convergent:'Convergent', divergent:'Divergent', mixed:'Mixed', independent:'Independent' }[vs] || 'Independent';
      html += `<div class="voice-card">
        <div class="voice-card-header">
          <div>
            <div class="voice-name">${v.figure}</div>
            <div class="voice-outlet">${v.outlet} · ${v.geo}</div>
          </div>
          <span class="vs-badge vs-${vs}">${vsLabel}</span>
        </div>
        ${v.recent_content_title ? `<div style="font-size:.77rem;color:var(--text-3);margin-bottom:.25rem;font-style:italic">"${v.recent_content_title}"</div>` : ''}
        <div class="voice-framing">${v.framing || '<span style="color:var(--text-3)">Not tracked today.</span>'}</div>
        <div class="voice-topics">${(v.topics||[]).map(t=>`<span class="tag" style="${tagColor(t)}">${t}</span>`).join('')}</div>
      </div>`;
    });
    html += `</div>`;
  }

  // Convergence points
  const convergences = (disc.convergence_points || []);
  if (convergences.length) {
    html += `<div style="margin:.25rem 0 .6rem;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);font-weight:700">Where they agree — for different reasons</div>`;
    convergences.forEach(c => {
      html += `<div class="convergence-card">
        <div class="c-topic">📍 ${c.topic}</div>
        <div class="c-why">${c.why_it_matters}</div>
        <div class="c-sub">
          Realist argument: ${c.realist_argument}<br>
          Nationalist argument: ${c.nationalist_argument}
        </div>
        <div style="margin-top:.5rem;display:flex;flex-wrap:wrap;gap:.3rem">
          ${(c.figures_involved||[]).map(f=>`<span class="tag" style="background:rgba(15,110,86,.15);color:var(--teal-fg)">${f}</span>`).join('')}
        </div>
      </div>`;
    });
  }

  // Divergence points
  const divergences = (disc.divergence_points || []);
  if (divergences.length) {
    html += `<div style="margin:.25rem 0 .6rem;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);font-weight:700">Where they split</div>`;
    divergences.forEach(dv => {
      html += `<div style="background:var(--bg-2);border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem;border-left:3px solid var(--coral-fg)">
        <div style="font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:.2rem">${dv.topic}</div>
        <div style="font-size:.82rem;color:var(--text-2)">${dv.description}</div>
      </div>`;
    });
  }

  return html;
}

function selectDay(i) {
  selectedIdx = i;
  render();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function shortDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

init();
</script>

</html>
